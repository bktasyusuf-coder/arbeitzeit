<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Arbeitszeiterfassung 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #22222d;
    --border: #2e2e3d;
    --accent: #7c6af7;
    --accent2: #c084fc;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --radius: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    padding: 24px 20px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .logo { font-size: 13px; font-weight: 700; color: var(--accent2); letter-spacing: 0.12em; text-transform: uppercase; }
  .year-badge {
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .month-title { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; }
  .nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 38px; height: 38px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items:center; justify-content:center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .nav-btn:active { transform: scale(0.92); background: var(--accent); }

  /* SUMMARY CARDS */
  .summary {
    padding: 16px 16px 0;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .card.green::before { background: var(--green); }
  .card.red::before { background: var(--red); }
  .card.blue::before { background: var(--blue); }
  .card.yellow::before { background: var(--yellow); }
  .card-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .card-value { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; line-height: 1; }
  .card-value.green { color: var(--green); }
  .card-value.red { color: var(--red); }
  .card-value.blue { color: var(--blue); }
  .card-value.yellow { color: var(--yellow); }
  .card-sub { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }

  /* TABS */
  .tabs {
    display: flex;
    padding: 16px 16px 0;
    gap: 8px;
  }
  .tab {
    flex: 1;
    padding: 9px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* DAY LIST */
  .day-list { padding: 12px 16px 100px; }
  .day-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
    transition: all 0.2s;
  }
  .day-entry.today { border-color: var(--accent); }
  .day-entry.weekend { opacity: 0.45; }
  .day-entry.feiertag { border-color: var(--yellow); }
  .day-entry.urlaub { border-color: var(--blue); }
  .day-entry.krank { border-color: var(--red); }

  .day-header {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    gap: 12px;
    cursor: pointer;
  }
  .day-num {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: var(--muted);
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }
  .day-entry.today .day-num { color: var(--accent2); }
  .day-info { flex: 1; }
  .day-name { font-size: 12px; color: var(--muted); font-weight: 600; }
  .day-status { font-size: 13px; font-weight: 700; margin-top: 1px; }
  .status-arbeiten { color: var(--green); }
  .status-urlaub { color: var(--blue); }
  .status-krank { color: var(--red); }
  .status-feiertag { color: var(--yellow); }
  .status-frei { color: var(--muted); }

  .day-hours {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    text-align: right;
    flex-shrink: 0;
  }
  .day-entry.weekend .day-hours { color: var(--muted); }

  /* TIME BADGES */
  .time-strip {
    display: flex;
    gap: 6px;
    padding: 0 14px 12px;
    flex-wrap: wrap;
  }
  .time-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    display: flex; align-items: center; gap: 5px;
  }
  .chip-label { color: var(--muted); font-size: 10px; }
  .chip-val { color: var(--text); font-weight: 500; }

  /* YEAR OVERVIEW */
  .year-view { padding: 12px 16px 100px; }
  .month-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .month-row:active { transform: scale(0.98); }
  .month-row.active-month { border-color: var(--accent); background: #1e1b38; }
  .month-name { font-size: 15px; font-weight: 700; flex: 1; }
  .month-stats { display: flex; gap: 14px; align-items: center; }
  .stat-pill { font-family: 'DM Mono', monospace; font-size: 12px; display: flex; align-items: center; gap: 4px; }
  .stat-pill .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink:0; }
  .dot-green { background: var(--green); }
  .dot-red { background: var(--red); }
  .dot-blue { background: var(--blue); }
  .diff-pos { color: var(--green); font-family: 'DM Mono', monospace; font-size: 12px; font-weight:500; }
  .diff-neg { color: var(--red); font-family: 'DM Mono', monospace; font-size: 12px; font-weight:500; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(15,15,19,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 10px 16px 20px;
    gap: 8px;
  }
  .bnav-btn {
    flex: 1;
    padding: 10px 8px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; flex-direction:column; align-items:center; gap: 4px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .bnav-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .bnav-icon { font-size: 18px; }

  /* NEW ENTRY FORM */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    display: none;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%;
    padding: 24px 20px 40px;
    max-height: 80vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; display:block; }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    outline: none;
    -webkit-appearance: none;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .status-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .status-btn {
    padding: 9px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .status-btn.sel-arbeiten { background: rgba(52,211,153,0.15); border-color: var(--green); color: var(--green); }
  .status-btn.sel-urlaub { background: rgba(96,165,250,0.15); border-color: var(--blue); color: var(--blue); }
  .status-btn.sel-krank { background: rgba(248,113,113,0.15); border-color: var(--red); color: var(--red); }
  .status-btn.sel-feiertag { background: rgba(251,191,36,0.15); border-color: var(--yellow); color: var(--yellow); }
  .status-btn.sel-frei { background: rgba(107,107,128,0.2); border-color: var(--muted); color: var(--muted); }
  .save-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .save-btn:active { transform: scale(0.97); background: var(--accent2); }
  .cancel-btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 12px 0 8px;
  }
  .today-indicator {
    width: 7px; height: 7px;
    background: var(--accent2);
    border-radius: 50%;
    display: inline-block;
    margin-left: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="logo">⏱ Arbeitszeit</span>
    <span class="year-badge">2026</span>
  </div>
  <div class="month-nav">
    <button class="nav-btn" onclick="prevMonth()">‹</button>
    <span class="month-title" id="monthTitle">Januar</span>
    <button class="nav-btn" onclick="nextMonth()">›</button>
  </div>
</div>

<div id="mainView">
  <div class="summary" id="summaryCards"></div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('days',this)">Tage</div>
    <div class="tab" onclick="switchTab('year',this)">Jahr</div>
  </div>
  <div id="daysTab" class="day-list" id="dayList"></div>
  <div id="yearTab" class="year-view" style="display:none"></div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="bnav-btn active" onclick="setView('month',this)">
    <span class="bnav-icon">📅</span>Monat
  </button>
  <button class="bnav-btn" onclick="openNewEntry()">
    <span class="bnav-icon">＋</span>Eintrag
  </button>
  <button class="bnav-btn" onclick="openPhotoScan()">
    <span class="bnav-icon">📷</span>Scan
  </button>
</div>

<!-- Photo Scan Modal -->
<div class="modal-overlay" id="photoModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📷 Foto scannen</div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px;line-height:1.5">Çalışma saati tablosunu veya dolu formu fotoğraflayın — AI otomatik okuyup sisteme aktarır.</p>

    <div id="photoPreviewArea" style="display:none;margin-bottom:16px">
      <img id="photoPreview" style="width:100%;border-radius:10px;border:1px solid var(--border);max-height:220px;object-fit:cover;">
    </div>

    <div id="photoDropZone" style="border:2px dashed var(--border);border-radius:12px;padding:30px 20px;text-align:center;cursor:pointer;margin-bottom:16px;transition:all 0.2s" onclick="document.getElementById('photoInput').click()">
      <div style="font-size:36px;margin-bottom:8px">📄</div>
      <div style="font-size:14px;font-weight:700;color:var(--text)">Foto seç veya çek</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">Kamera veya galeri</div>
      <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" onchange="onPhotoSelected(event)">
    </div>

    <div id="scanResult" style="display:none">
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;max-height:200px;overflow-y:auto">
        <div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px">AI Sonucu</div>
        <div id="scanResultText" style="font-size:13px;color:var(--text);line-height:1.6;font-family:'DM Mono',monospace;white-space:pre-wrap"></div>
      </div>
      <button class="save-btn" onclick="applyScanResult()" id="applyBtn">✅ Kaydet</button>
    </div>

    <div id="scanLoading" style="display:none;text-align:center;padding:20px">
      <div style="font-size:32px;margin-bottom:8px;animation:spin 1s linear infinite">⏳</div>
      <div style="font-size:14px;color:var(--muted)">AI okuyor...</div>
    </div>

    <button class="cancel-btn" onclick="closePhotoModal()">Kapat</button>
  </div>
</div>

<style>
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
</style>

<!-- New Entry Modal -->
<div class="modal-overlay" id="entryModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Neuer Eintrag</div>
    <div class="form-group">
      <label class="form-label">Datum</label>
      <input type="date" class="form-input" id="entryDate">
    </div>
    <div class="form-group">
      <label class="form-label">Status</label>
      <div class="status-btns" id="statusBtns">
        <button class="status-btn" onclick="selectStatus('Arbeiten',this)">✅ Arbeiten</button>
        <button class="status-btn" onclick="selectStatus('Urlaub',this)">🏖️ Urlaub</button>
        <button class="status-btn" onclick="selectStatus('Krank',this)">🤒 Krank</button>
        <button class="status-btn" onclick="selectStatus('Feiertag',this)">🎉 Feiertag</button>
        <button class="status-btn" onclick="selectStatus('Frei',this)">🔕 Frei</button>
      </div>
    </div>
    <div class="form-row" id="timeFields">
      <div class="form-group">
        <label class="form-label">Start</label>
        <input type="time" class="form-input" id="entryStart" value="07:45">
      </div>
      <div class="form-group">
        <label class="form-label">Pause</label>
        <input type="time" class="form-input" id="entryPause" value="01:00">
      </div>
      <div class="form-group">
        <label class="form-label">Ende</label>
        <input type="time" class="form-input" id="entryEnd" value="17:00">
      </div>
      <div class="form-group">
        <label class="form-label">Arbeitszeit</label>
        <input type="text" class="form-input" id="entryCalc" readonly placeholder="--:--">
      </div>
    </div>
    <button class="save-btn" onclick="saveEntry()">💾 Speichern</button>
    <button class="cancel-btn" onclick="closeModal()">Abbrechen</button>
  </div>
</div>

<script>

  "2026-02-24":"Krank","2026-02-25":"Krank","2026-02-26":"Krank","2026-02-27":"Krank",

const excelTimes = {
  "2026-01-06":{start:"07:45",pause:"01:00",end:"17:00",hours:"08:15"},
  "2026-01-07":{start:"07:45",pause:"01:00",end:"17:00",hours:"08:15"},

  "2026-01-20":{start:"07:45",pause:"01:00",end:"17:00",hours:"08:15"},
  "2026-01-21":{start:"07:45",pause:"01:00",end:"17:00",hours:"08:15"},
  "2026-01-22":{start:"07:45",pause:"01:00",end:"17:00",hours:"08:15"},
  "2026-01-23":{start:"07:45",pause:"00:30",end:"14:30",hours:"06:15"},
  "2026-01-26":{start:"07:45",pause:"01:00",end:"17:00",hours:"08:15"},
  "2026-01-27":{start:"07:45",pause:"01:00",end:"17:00",hours:"08:15"},
  "2026-01-28":{start:"07:45",pause:"01:00",end:"17:00",hours:"08:15"},
  "2026-01-29":{start:"07:45",pause:"01:00",end:"17:00",hours:"08:15"},
  "2026-01-30":{start:"07:45",pause:"00:30",end:"14:30",hours:"06:15"},
};

// ─── STANDARD TIMES BY WEEKDAY ──────────────────────────────────
// 0=So, 1=Mo, 2=Di, 3=Mi, 4=Do, 5=Fr, 6=Sa
const STANDARD_TIMES = {
  1: {start:"07:45", pause:"01:00", end:"17:00", hours:"08:15"}, // Mo
  2: {start:"07:45", pause:"01:00", end:"17:00", hours:"08:15"}, // Di
  3: {start:"07:45", pause:"01:00", end:"17:00", hours:"08:15"}, // Mi
  4: {start:"07:45", pause:"01:00", end:"17:00", hours:"08:15"}, // Do
  5: {start:"07:45", pause:"00:30", end:"14:30", hours:"06:15"}, // Fr
};

function getStandardTimes(dateStr) {
  const d = new Date(dateStr);
  return STANDARD_TIMES[d.getDay()] || null;
}

let userData = JSON.parse(localStorage.getItem('az_user_data')||'{}');
let userTimes = JSON.parse(localStorage.getItem('az_user_times')||'{}');
let currentMonth = new Date().getMonth(); // 0-indexed
let currentYear = 2026;
let selectedStatus = 'Arbeiten';
let editingDate = null;
let currentView = 'month';

function saveData() {
  localStorage.setItem('az_user_data', JSON.stringify(userData));
  localStorage.setItem('az_user_times', JSON.stringify(userTimes));
}

function getDayStatus(dateStr) {
  if (userTimes[dateStr]) return userData[dateStr] || excelDays[dateStr] || null;
  return userData[dateStr] || excelDays[dateStr] || null;
}

function getDayTimes(dateStr) {
  return userTimes[dateStr] || excelTimes[dateStr] || getStandardTimes(dateStr) || null;
}

function getDaysInMonth(year, month) {
  return new Date(year, month + 1, 0).getDate();
}

function getDayOfWeek(year, month, day) {
  return new Date(year, month, day).getDay();
}

function isWeekend(dow) { return dow === 0 || dow === 6; }

function isToday(year, month, day) {
  const t = new Date();
  return t.getFullYear() === year && t.getMonth() === month && t.getDate() === day;
}

function formatTimeH(h) {
  if (!h) return '--:--';
  return h;
}

function calcWorkHours(start, pause, end) {
  if (!start || !end) return '';
  const [sh,sm] = start.split(':').map(Number);
  const [ph,pm] = (pause||'00:00').split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  let mins = (eh*60+em) - (sh*60+sm) - (ph*60+pm);
  if (mins < 0) return '';
  return `${String(Math.floor(mins/60)).padStart(2,'0')}:${String(mins%60).padStart(2,'0')}`;
}

function parseDaysHours(str) {
  if (!str) return 0;
  const m = str.match(/(\d+)\s*days?,\s*(\d+):(\d+)/);
  if (m) return parseInt(m[1])*24*60 + parseInt(m[2])*60 + parseInt(m[3]);
  return 0;
}

function minsToHours(m) {
  const h = Math.floor(m/60), mm = m%60;
  return `${h}:${String(mm).padStart(2,'0')}`;
}

// ─── RENDER ─────────────────────────────────────────────────────
function render() {
  const mk = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  document.getElementById('monthTitle').textContent = MONTHS[currentMonth];

  // Summary cards
  const md = defaultData[mk] || {};
  const diff = md.diff || '0:00';
  const isPos = diff.startsWith('+');
  const actualMins = parseDaysHours(md.actualH);
  const stdMins = parseDaysHours(md.standardH);

  document.getElementById('summaryCards').innerHTML = `
    <div class="card ${isPos?'green':'red'}">
      <div class="card-label">Differenz</div>
      <div class="card-value ${isPos?'green':'red'}">${diff}</div>
      <div class="card-sub">Std</div>
    </div>
    <div class="card blue">
      <div class="card-label">Gearbeitet</div>
      <div class="card-value blue">${minsToHours(actualMins)}</div>
      <div class="card-sub">von ${minsToHours(stdMins)} Std</div>
    </div>
    <div class="card yellow">
      <div class="card-label">Urlaub</div>
      <div class="card-value yellow">${md.urlaub||0} Tage</div>
      <div class="card-sub">Genommen</div>
    </div>
    <div class="card red">
      <div class="card-label">Krank</div>
      <div class="card-value red">${md.krank||0} Tage</div>
      <div class="card-sub">Fehltage</div>
    </div>
  `;

  renderDays();
  renderYear();
}

function renderDays() {
  const total = getDaysInMonth(currentYear, currentMonth);
  let html = '';
  
  for (let d = 1; d <= total; d++) {
    const dow = getDayOfWeek(currentYear, currentMonth, d);
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const status = getDayStatus(dateStr);
    const times = getDayTimes(dateStr);
    const weekend = isWeekend(dow);
    const today = isToday(currentYear, currentMonth, d);
    
    let cls = 'day-entry';
    if (today) cls += ' today';
    if (weekend && !status) cls += ' weekend';
    if (status === 'Urlaub') cls += ' urlaub';
    if (status === 'Krank') cls += ' krank';
    if (status === 'Feiertag') cls += ' feiertag';
    
    let statusLabel = '—';
    let statusCls = 'status-frei';
    if (status === 'Arbeiten') { statusLabel = '✓ Arbeiten'; statusCls = 'status-arbeiten'; }
    else if (status === 'Urlaub') { statusLabel = '🏖 Urlaub'; statusCls = 'status-urlaub'; }
    else if (status === 'Krank') { statusLabel = '🤒 Krank'; statusCls = 'status-krank'; }
    else if (status === 'Feiertag') { statusLabel = '🎉 Feiertag'; statusCls = 'status-feiertag'; }
    else if (weekend) { statusLabel = 'Wochenende'; statusCls = 'status-frei'; }
    
    const hoursStr = times ? times.hours : (status === 'Arbeiten' ? '08:15' : '');
    
    html += `<div class="${cls}" onclick="onDayClick('${dateStr}', ${d})">
      <div class="day-header">
        <div class="day-num">${d}${today?'<span class="today-indicator"></span>':''}</div>
        <div class="day-info">
          <div class="day-name">${DAYS_DE[dow]}</div>
          <div class="day-status ${statusCls}">${statusLabel}</div>
        </div>
        <div class="day-hours">${hoursStr ? `<span style="color:var(--green)">${hoursStr}</span>` : ''}</div>
      </div>`;
    
    if (times && status === 'Arbeiten') {
      html += `<div class="time-strip">
        <div class="time-chip"><span class="chip-label">Start</span><span class="chip-val">${times.start}</span></div>
        <div class="time-chip"><span class="chip-label">Pause</span><span class="chip-val">${times.pause}</span></div>
        <div class="time-chip"><span class="chip-label">Ende</span><span class="chip-val">${times.end}</span></div>
      </div>`;
    }
    html += '</div>';
  }
  
  document.getElementById('daysTab').innerHTML = html;
}

function renderYear() {
  let html = '';
  for (let m = 0; m < 12; m++) {
    const mk = `${currentYear}-${String(m+1).padStart(2,'0')}`;
    const md = defaultData[mk] || {};
    const diff = md.diff || '—';
    const isPos = diff.startsWith('+');
    const isActive = m === currentMonth;
    
    html += `<div class="month-row ${isActive?'active-month':''}" onclick="goToMonth(${m})">
      <div class="month-name">${MONTHS[m]}</div>
      <div class="month-stats">
        ${md.urlaub ? `<div class="stat-pill"><div class="dot dot-blue"></div>${md.urlaub}U</div>` : ''}
        ${md.krank ? `<div class="stat-pill"><div class="dot dot-red"></div>${md.krank}K</div>` : ''}
        <div class="${isPos?'diff-pos':'diff-neg'}">${diff}</div>
      </div>
    </div>`;
  }
  document.getElementById('yearTab').innerHTML = html;
}

// ─── INTERACTIONS ────────────────────────────────────────────────
function prevMonth() {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  render();
}

function nextMonth() {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  render();
}

function goToMonth(m) {
  currentMonth = m;
  switchTab('days', document.querySelectorAll('.tab')[0]);
  render();
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('daysTab').style.display = tab === 'days' ? 'block' : 'none';
  document.getElementById('yearTab').style.display = tab === 'year' ? 'block' : 'none';
}

function setView(v, el) {
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function onDayClick(dateStr, day) {
  editingDate = dateStr;
  const status = getDayStatus(dateStr);
  const times = getDayTimes(dateStr);
  
  document.getElementById('modalTitle').textContent = `${day}. ${MONTHS[currentMonth]}`;
  document.getElementById('entryDate').value = dateStr;
  
  selectedStatus = status || 'Arbeiten';
  updateStatusBtns();
  
  if (times) {
    document.getElementById('entryStart').value = times.start || '07:45';
    document.getElementById('entryPause').value = times.pause || '01:00';
    document.getElementById('entryEnd').value = times.end || '17:00';
    updateCalc();
  } else {
    const std = getStandardTimes(dateStr);
    document.getElementById('entryStart').value = std ? std.start : '07:45';
    document.getElementById('entryPause').value = std ? std.pause : '01:00';
    document.getElementById('entryEnd').value = std ? std.end : '17:00';
    updateCalc();
  }
  
  document.getElementById('entryModal').classList.add('open');
}

function openNewEntry() {
  editingDate = null;
  const today = new Date();
  const ds = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  document.getElementById('modalTitle').textContent = 'Neuer Eintrag';
  document.getElementById('entryDate').value = ds;
  selectedStatus = 'Arbeiten';
  updateStatusBtns();
  const std = getStandardTimes(ds);
  document.getElementById('entryStart').value = std ? std.start : '07:45';
  document.getElementById('entryPause').value = std ? std.pause : '01:00';
  document.getElementById('entryEnd').value = std ? std.end : '17:00';
  updateCalc();
  document.getElementById('entryModal').classList.add('open');
}

function closeModal() {
  document.getElementById('entryModal').classList.remove('open');
  editingDate = null;
}

function selectStatus(s, el) {
  selectedStatus = s;
  updateStatusBtns();
  document.getElementById('timeFields').style.display = (s === 'Arbeiten' || s === 'Feiertag') ? 'grid' : 'none';
}

function updateStatusBtns() {
  document.querySelectorAll('.status-btn').forEach(b => {
    b.className = 'status-btn';
    const s = b.textContent.trim().split(' ').pop();
    if (s === selectedStatus) b.className = `status-btn sel-${selectedStatus.toLowerCase()}`;
  });
  document.getElementById('timeFields').style.display = (selectedStatus === 'Arbeiten' || selectedStatus === 'Feiertag') ? 'grid' : 'none';
}

function updateCalc() {
  const s = document.getElementById('entryStart').value;
  const p = document.getElementById('entryPause').value;
  const e = document.getElementById('entryEnd').value;
  document.getElementById('entryCalc').value = calcWorkHours(s,p,e) || '--:--';
}

document.getElementById('entryStart').addEventListener('change', updateCalc);
document.getElementById('entryPause').addEventListener('change', updateCalc);
document.getElementById('entryEnd').addEventListener('change', updateCalc);

function saveEntry() {
  const dateStr = document.getElementById('entryDate').value;
  if (!dateStr) return;
  
  userData[dateStr] = selectedStatus;
  
  if (selectedStatus === 'Arbeiten') {
    userTimes[dateStr] = {
      start: document.getElementById('entryStart').value,
      pause: document.getElementById('entryPause').value,
      end: document.getElementById('entryEnd').value,
      hours: document.getElementById('entryCalc').value,
    };
  } else {
    delete userTimes[dateStr];
  }
  
  saveData();
  closeModal();
  
  // Update month from date
  const parts = dateStr.split('-');
  currentYear = parseInt(parts[0]);
  currentMonth = parseInt(parts[1]) - 1;
  render();
}

// ─── PHOTO SCAN ─────────────────────────────────────────────────
let scannedEntries = [];

function openPhotoScan() {
  document.getElementById('photoModal').classList.add('open');
  document.getElementById('photoPreviewArea').style.display = 'none';
  document.getElementById('scanResult').style.display = 'none';
  document.getElementById('scanLoading').style.display = 'none';
  document.getElementById('photoInput').value = '';
  scannedEntries = [];
}

function closePhotoModal() {
  document.getElementById('photoModal').classList.remove('open');
}

async function onPhotoSelected(event) {
  const file = event.target.files[0];
  if (!file) return;

  // Show preview
  const reader = new FileReader();
  reader.onload = async (e) => {
    document.getElementById('photoPreview').src = e.target.result;
    document.getElementById('photoPreviewArea').style.display = 'block';
    document.getElementById('scanResult').style.display = 'none';
    document.getElementById('scanLoading').style.display = 'block';

    const base64 = e.target.result.split(',')[1];
    const mediaType = file.type || 'image/jpeg';

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              {
                type: "image",
                source: { type: "base64", media_type: mediaType, data: base64 }
              },
              {
                type: "text",
                text: `Bu bir çalışma saati tablosu veya formu. Tablodaki her gün için verileri oku ve şu JSON formatında döndür (başka hiçbir şey yazma, sadece JSON array):
[
  {"date":"2026-MM-DD","status":"Arbeiten","start":"HH:MM","pause":"HH:MM","end":"HH:MM","hours":"HH:MM"},
  {"date":"2026-MM-DD","status":"Urlaub"},
  {"date":"2026-MM-DD","status":"Krank"}
]
Status değerleri: Arbeiten, Urlaub, Krank, Feiertag, Frei
Tarih formatı: YYYY-MM-DD
Saat formatı: HH:MM
Sadece dolu/görünür olan günleri döndür. Boş veya hafta sonu günleri atlat. Eğer yıl belli değilse 2026 kullan.`
              }
            ]
          }]
        })
      });

      const data = await response.json();
      const text = data.content?.map(i => i.text || '').join('') || '';

      document.getElementById('scanLoading').style.display = 'none';

      try {
        const clean = text.replace(/```json|```/g, '').trim();
        scannedEntries = JSON.parse(clean);
        const summary = scannedEntries.map(e =>
          `${e.date}  ${e.status}${e.start ? `  ${e.start}→${e.end}  (${e.hours})` : ''}`
        ).join('\n');
        document.getElementById('scanResultText').textContent = summary || 'Veri bulunamadı.';
        document.getElementById('applyBtn').style.display = scannedEntries.length > 0 ? 'block' : 'none';
      } catch {
        document.getElementById('scanResultText').textContent = text || 'Okunamadı.';
        document.getElementById('applyBtn').style.display = 'none';
      }
      document.getElementById('scanResult').style.display = 'block';

    } catch (err) {
      document.getElementById('scanLoading').style.display = 'none';
      document.getElementById('scanResultText').textContent = 'Hata: ' + err.message;
      document.getElementById('applyBtn').style.display = 'none';
      document.getElementById('scanResult').style.display = 'block';
    }
  };
  reader.readAsDataURL(file);
}

function applyScanResult() {
  if (!scannedEntries.length) return;
  let count = 0;
  scannedEntries.forEach(e => {
    if (!e.date) return;
    userData[e.date] = e.status;
    if (e.status === 'Arbeiten' && e.start) {
      userTimes[e.date] = { start: e.start, pause: e.pause||'01:00', end: e.end, hours: e.hours };
    }
    count++;
  });
  saveData();
  closePhotoModal();
  render();
  setTimeout(() => alert(`✅ ${count} gün başarıyla aktarıldı!`), 200);
}

document.getElementById('photoModal').addEventListener('click', function(e) {
  if (e.target === this) closePhotoModal();
});

// Close modal on backdrop click
document.getElementById('entryModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Init
render();
</script>
