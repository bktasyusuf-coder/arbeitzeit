<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a12;--card:#141422;--card2:#1a1a2e;--purple:#7c3aed;--purple2:#a855f7;--green:#22c55e;--red:#ef4444;--orange:#f97316;--blue:#3b82f6;--cyan:#06b6d4;--text:#e2e8f0;--text2:#94a3b8;--border:#2a2a3e}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;-webkit-user-select:none;user-select:none}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:16px;text-align:center;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.header h1{font-size:18px;font-weight:700;margin-bottom:8px}
.year-tabs{display:flex;gap:6px;justify-content:center;margin-bottom:8px}
.year-tab{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer}
.year-tab.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.month-nav{display:flex;align-items:center;justify-content:center;gap:16px}
.month-nav button{background:var(--card2);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.month-nav span{font-size:16px;font-weight:600;min-width:140px;text-align:center}
.today-btn{background:var(--cyan)!important;border-color:var(--cyan)!important;color:#fff!important;font-size:12px!important;width:auto!important;padding:0 12px!important;border-radius:16px!important}
.sync-status{font-size:10px;color:var(--text2);margin-top:4px}
.sync-status.synced{color:var(--green)}
.sync-status.error{color:var(--red)}
.summary{display:flex;gap:8px;padding:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.summary::-webkit-scrollbar{display:none}
.stat-card{flex:0 0 auto;min-width:120px;background:var(--card);border-radius:12px;padding:12px;text-align:center;border:1px solid var(--border)}
.stat-card .label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
.stat-card .value{font-size:20px;font-weight:700;margin:4px 0}
.stat-card .sub{font-size:11px;color:var(--text2)}
.stat-card.positive .value{color:var(--green)}
.stat-card.negative .value{color:var(--red)}
.stat-card.orange .value{color:var(--orange)}
.stat-card.blue .value{color:var(--blue)}
.stat-card.cyan .value{color:var(--cyan)}
.urlaub-bar{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.urlaub-bar .fill{height:100%;background:var(--blue);border-radius:2px;transition:width 0.3s}
.urlaub-bar .fill.warn{background:var(--red)}
.tab-bar{display:flex;gap:4px;padding:8px 12px;justify-content:center}
.tab-btn{padding:8px 16px;border-radius:20px;border:none;background:var(--card);color:var(--text2);font-size:13px;cursor:pointer}
.tab-btn.active{background:var(--purple);color:#fff}
.days-list{padding:8px 12px}
.day-item{background:var(--card);border-radius:12px;padding:12px;margin-bottom:6px;border:1px solid var(--border);cursor:pointer;transition:transform 0.1s}
.day-item:active{transform:scale(0.98)}
.day-item.weekend{opacity:0.7}
.day-item.urlaub{border-left:3px solid var(--blue)}
.day-item.krank{border-left:3px solid var(--red)}
.day-item.feiertag{border-left:3px solid var(--cyan)}
.day-item.notdienst-day{border-left:3px solid var(--orange)}
.day-row{display:flex;justify-content:space-between;align-items:center}
.day-date{font-weight:600;font-size:14px}
.day-name{color:var(--text2);font-size:12px}
.day-status{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:500}
.day-status.arbeiten{background:rgba(124,58,237,0.2);color:var(--purple2)}
.day-status.urlaub{background:rgba(59,130,246,0.2);color:var(--blue)}
.day-status.krank{background:rgba(239,68,68,0.2);color:var(--red)}
.day-status.feiertag{background:rgba(6,182,212,0.2);color:var(--cyan)}
.time-strip{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.time-chip{font-size:11px;color:var(--text2);background:var(--card2);padding:2px 8px;border-radius:8px}
.nd-entry{background:rgba(249,115,22,0.1);border-radius:8px;padding:6px 8px;margin-top:6px;font-size:12px;color:var(--orange)}
.nd-entry .nd-times{color:var(--text2);font-size:11px}
.nd-entry .nd-desc{color:var(--text2);font-size:11px;font-style:italic}
.note-indicator{font-size:11px;color:var(--purple2);margin-top:4px}
.add-nd-btn{font-size:11px;color:var(--orange);background:none;border:1px dashed var(--orange);border-radius:8px;padding:4px 10px;margin-top:6px;cursor:pointer;opacity:0.7}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:20px;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:18px;font-weight:700}
.modal-close{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:10px;font-size:13px;cursor:pointer}
.status-btns{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.status-btn{padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--text2);font-size:13px;cursor:pointer}
.status-btn.active{border-color:var(--purple);color:var(--purple);background:rgba(124,58,237,0.1)}
.time-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.time-group label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px}
.time-group input,.time-group textarea{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px;font-size:14px}
.time-group textarea{resize:none;height:60px;font-family:inherit}
.time-group input:disabled{opacity:0.4}
.calc-display{text-align:center;font-size:20px;font-weight:700;color:var(--green);margin:10px 0}
.note-group{grid-column:1/-1}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;justify-content:center;gap:4px;padding:10px;z-index:100}
.nav-btn{background:var(--card2);border:1px solid var(--border);color:var(--text2);padding:10px 16px;border-radius:12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px}
.nav-btn:active{background:var(--purple);color:#fff}
.jahres-view{padding:12px}
.jahres-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.jahres-stat{background:var(--card);border-radius:12px;padding:14px;text-align:center;border:1px solid var(--border)}
.jahres-stat .jlabel{font-size:10px;color:var(--text2);text-transform:uppercase}
.jahres-stat .jvalue{font-size:22px;font-weight:700;margin:4px 0}
.month-bar{background:var(--card);border-radius:12px;padding:12px;margin-bottom:6px;border:1px solid var(--border);cursor:pointer}
.month-bar:active{transform:scale(0.98)}
.month-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.month-bar-name{font-weight:600;font-size:14px}
.month-bar-diff{font-size:13px;font-weight:600}
.bar-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:var(--purple);transition:width 0.5s}
.daten-modal .daten-btns{display:flex;gap:10px;margin-top:10px}
.daten-btn{flex:1;padding:20px;border-radius:12px;border:1px solid var(--border);background:var(--card2);color:var(--text);text-align:center;cursor:pointer;font-size:14px}
.daten-btn:active{background:var(--purple);color:#fff}
.daten-btn .dicon{font-size:28px;margin-bottom:6px}
.nd-modal .nd-time-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.nd-modal .nd-desc-input{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px;font-size:14px;margin-bottom:10px}
.nd-modal .nd-calc{text-align:center;font-size:18px;font-weight:700;color:var(--orange);margin:10px 0}
.nd-modal .nd-save-btn{width:100%;padding:12px;border-radius:12px;border:none;background:var(--orange);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.scan-modal .scan-btns{display:flex;gap:10px;margin-top:10px}
.scan-btn{flex:1;padding:20px;border-radius:12px;border:1px solid var(--border);background:var(--card2);color:var(--text);text-align:center;cursor:pointer;font-size:14px}
.scan-btn .sicon{font-size:28px;margin-bottom:6px}
.hidden{display:none}
</style>
</head>
<body>

<script>
// ===== SUPABASE CONFIG =====
const SUPABASE_URL = 'https://yubefgtlicwwsjryqdrj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_bgby0DIM_wi7FeSr3Ob-Ig_Tm9GN42F';
const SUPABASE_TABLE = 'arbeitszeit';
const DATA_ROW_ID = 1;

async function supabaseLoad() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?id=eq.${DATA_ROW_ID}&select=data`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const rows = await r.json();
    if (rows && rows.length > 0 && rows[0].data) {
      return typeof rows[0].data === 'string' ? JSON.parse(rows[0].data) : rows[0].data;
    }
    return null;
  } catch(e) { console.error('Supabase load error:', e); return null; }
}

async function supabaseSave(data) {
  try {
    const jsonStr = JSON.stringify(data);
    // Try update first
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?id=eq.${DATA_ROW_ID}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ data: jsonStr })
    });
    if (r.status === 404 || r.status === 406) {
      // Row doesn't exist, insert
      await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ id: DATA_ROW_ID, data: jsonStr })
      });
    }
    updateSyncStatus('synced', 'Mit Cloud synchronisiert ✓');
    return true;
  } catch(e) {
    console.error('Supabase save error:', e);
    updateSyncStatus('error', 'Sync-Fehler — lokal gespeichert');
    return false;
  }
}

function updateSyncStatus(cls, text) {
  const el = document.getElementById('syncStatus');
  if (el) { el.className = 'sync-status ' + cls; el.textContent = text; }
}

// ===== DATA LAYER =====
let userData = {};
let userTimes = {};
let userNotes = {};
let userNotdienst = {};

function loadAllData() {
  try {
    userData = JSON.parse(localStorage.getItem('az_userData_v10') || '{}');
    userTimes = JSON.parse(localStorage.getItem('az_userTimes_v10') || '{}');
    userNotes = JSON.parse(localStorage.getItem('az_userNotes_v10') || '{}');
    userNotdienst = JSON.parse(localStorage.getItem('az_userNotdienst_v10') || '{}');
  } catch(e) {
    userData = {}; userTimes = {}; userNotes = {}; userNotdienst = {};
  }
}

function saveAllData() {
  localStorage.setItem('az_userData_v10', JSON.stringify(userData));
  localStorage.setItem('az_userTimes_v10', JSON.stringify(userTimes));
  localStorage.setItem('az_userNotes_v10', JSON.stringify(userNotes));
  localStorage.setItem('az_userNotdienst_v10', JSON.stringify(userNotdienst));
  // Auto-sync to Supabase
  supabaseSave({ userData, userTimes, userNotes, userNotdienst });
}

async function initData() {
  loadAllData();
  // Try loading from Supabase (cloud has priority if local is empty)
  const hasLocal = Object.keys(userData).length > 0 || Object.keys(userTimes).length > 0;
  try {
    const cloud = await supabaseLoad();
    if (cloud) {
      if (!hasLocal) {
        // Local empty, use cloud data
        userData = cloud.userData || {};
        userTimes = cloud.userTimes || {};
        userNotes = cloud.userNotes || {};
        userNotdienst = cloud.userNotdienst || {};
        localStorage.setItem('az_userData_v10', JSON.stringify(userData));
        localStorage.setItem('az_userTimes_v10', JSON.stringify(userTimes));
        localStorage.setItem('az_userNotes_v10', JSON.stringify(userNotes));
        localStorage.setItem('az_userNotdienst_v10', JSON.stringify(userNotdienst));
        updateSyncStatus('synced', 'Aus Cloud geladen ✓');
      } else {
        updateSyncStatus('synced', 'Mit Cloud verbunden ✓');
      }
    } else {
      if (hasLocal) {
        // Push local to cloud
        supabaseSave({ userData, userTimes, userNotes, userNotdienst });
      }
      updateSyncStatus('synced', 'Verbunden ✓');
    }
  } catch(e) {
    updateSyncStatus('error', 'Offline — lokal gespeichert');
  }
  render();
}

// ===== YEAR DATA =====
const MONTH_NAMES = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const DAY_NAMES_FULL = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];

const HOLIDAYS = {
  2026: {'2026-01-01':'Neujahr','2026-04-03':'Karfreitag','2026-04-06':'Ostermontag','2026-05-01':'Tag der Arbeit','2026-05-14':'Christi Himmelfahrt','2026-05-25':'Pfingstmontag','2026-10-03':'Tag der Deutschen Einheit','2026-10-31':'Reformationstag','2026-12-25':'1. Weihnachtstag','2026-12-26':'2. Weihnachtstag'},
  2027: {'2027-01-01':'Neujahr','2027-03-26':'Karfreitag','2027-03-29':'Ostermontag','2027-05-01':'Tag der Arbeit','2027-05-06':'Christi Himmelfahrt','2027-05-17':'Pfingstmontag','2027-10-03':'Tag der Deutschen Einheit','2027-10-31':'Reformationstag','2027-12-25':'1. Weihnachtstag','2027-12-26':'2. Weihnachtstag'},
  2028: {'2028-01-01':'Neujahr','2028-04-14':'Karfreitag','2028-04-17':'Ostermontag','2028-05-01':'Tag der Arbeit','2028-05-25':'Christi Himmelfahrt','2028-06-05':'Pfingstmontag','2028-10-03':'Tag der Deutschen Einheit','2028-10-31':'Reformationstag','2028-12-25':'1. Weihnachtstag','2028-12-26':'2. Weihnachtstag'}
};

const STANDARD_TIMES = {
  1: {start:'07:45',pause:'01:00',end:'17:00',hours:'08:15'},
  2: {start:'07:45',pause:'01:00',end:'17:00',hours:'08:15'},
  3: {start:'07:45',pause:'01:00',end:'17:00',hours:'08:15'},
  4: {start:'07:45',pause:'01:00',end:'17:00',hours:'08:15'},
  5: {start:'07:45',pause:'00:30',end:'14:30',hours:'06:15'},
  0: {start:'07:45',pause:'01:00',end:'17:00',hours:'08:15'},
  6: {start:'07:45',pause:'01:00',end:'17:00',hours:'08:15'}
};

const URLAUB_KRANK_TIMES = {start:'08:00',pause:'00:00',end:'17:00',hours:'09:00'};

function pad2(n){return String(n).padStart(2,'0')}
function dateStr(y,m,d){return `${y}-${pad2(m+1)}-${pad2(d)}`}
function isWeekend(dow){return dow===0||dow===6}
function isHoliday(ds,year){return !!(HOLIDAYS[year]&&HOLIDAYS[year][ds])}
function getHolidayName(ds,year){return HOLIDAYS[year]?HOLIDAYS[year][ds]:null}

function getDayStatus(ds) {
  if (userData[ds]) return userData[ds];
  const y = parseInt(ds.substring(0,4));
  if (isHoliday(ds, y)) return 'Feiertag';
  const d = new Date(ds); const dow = d.getDay();
  if (isWeekend(dow)) return null;
  return 'Arbeiten';
}

function getStandardTimes(ds) {
  const status = getDayStatus(ds);
  if (status === 'Urlaub' || status === 'Krank' || status === 'Feiertag') return {...URLAUB_KRANK_TIMES};
  const d = new Date(ds);
  return {...(STANDARD_TIMES[d.getDay()] || STANDARD_TIMES[1])};
}

function getDayTimes(ds) {
  if (userTimes[ds]) return userTimes[ds];
  return getStandardTimes(ds);
}

function calcHours(start, end, pause) {
  if (!start || !end) return '00:00';
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  let [ph,pm] = (pause||'00:00').split(':').map(Number);
  let mins = (eh*60+em) - (sh*60+sm) - (ph*60+pm);
  if (mins < 0) mins += 24*60;
  return pad2(Math.floor(mins/60)) + ':' + pad2(mins%60);
}

function timeToMins(t) {
  if (!t) return 0;
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}

function minsToTime(m) {
  const neg = m < 0; m = Math.abs(m);
  return (neg?'-':'') + pad2(Math.floor(m/60)) + ':' + pad2(m%60);
}

// ===== CALC STATS =====
function calcMonthStats(year, month) {
  let workedMins = 0, standardMins = 0, urlaubDays = 0, krankDays = 0, notdienstMins = 0, notdienstCount = 0, feiertage = 0;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = dateStr(year, month, d);
    const dt = new Date(ds);
    const dow = dt.getDay();
    const status = getDayStatus(ds);
    // Notdienst (independent of day type)
    const ndArr = userNotdienst[ds] || [];
    for (const nd of ndArr) {
      if (nd.start && nd.end) {
        notdienstMins += timeToMins(calcHours(nd.start, nd.end, '00:00'));
        notdienstCount++;
      }
    }
    // Skip weekends for normal calculation
    if (isWeekend(dow) && status !== 'Arbeiten') continue;
    if (status === 'Feiertag') { feiertage++; continue; }
    if (status === 'Urlaub') { urlaubDays++; standardMins += 174*60/21; continue; }
    if (status === 'Krank') { krankDays++; standardMins += 174*60/21; continue; }
    if (status === 'Arbeiten') {
      const times = getDayTimes(ds);
      if (times && times.start && times.end) {
        workedMins += timeToMins(calcHours(times.start, times.end, times.pause || '00:00'));
      }
      standardMins += timeToMins(STANDARD_TIMES[dow === 0 || dow === 6 ? 1 : dow].hours);
    }
  }
  const diffMins = workedMins - standardMins;
  return { workedMins, standardMins, diffMins, urlaubDays, krankDays, notdienstMins, notdienstCount, feiertage };
}

function calcYearUrlaub(year) {
  let total = 0;
  for (let m = 0; m < 12; m++) {
    const dim = new Date(year, m+1, 0).getDate();
    for (let d = 1; d <= dim; d++) {
      if (getDayStatus(dateStr(year, m, d)) === 'Urlaub') total++;
    }
  }
  return total;
}

// ===== STATE =====
let currentYear = 2026, currentMonth = 0, currentTab = 'tage';
let editingDate = null, selectedStatus = null;
let ndEditDate = null, ndEditIndex = -1;

function setYear(y) { currentYear = y; currentMonth = 0; render(); }
function prevMonth() { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; if (currentYear < 2026) { currentYear = 2026; currentMonth = 0; } } render(); }
function nextMonth() { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; if (currentYear > 2028) { currentYear = 2028; currentMonth = 11; } } render(); }
function goToday() { const t = new Date(); currentYear = t.getFullYear(); if (currentYear < 2026) currentYear = 2026; if (currentYear > 2028) currentYear = 2028; currentMonth = t.getMonth(); render(); }

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('daysTab').classList.toggle('hidden', tab !== 'tage');
  document.getElementById('jahresTab').classList.toggle('hidden', tab !== 'jahres');
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0 && tab==='tage') || (i===1 && tab==='jahres')));
  render();
}

// ===== RENDER =====
function render() {
  renderYearTabs();
  renderMonthLabel();
  renderSummary();
  if (currentTab === 'tage') renderDays();
  else renderJahres();
}

function renderYearTabs() {
  document.getElementById('yearTabs').innerHTML = [2026,2027,2028].map(y =>
    `<button class="year-tab ${y===currentYear?'active':''}" onclick="setYear(${y})">${y}</button>`
  ).join('');
}

function renderMonthLabel() {
  document.getElementById('monthLabel').textContent = MONTH_NAMES[currentMonth] + ' ' + currentYear;
}

function renderSummary() {
  const stats = calcMonthStats(currentYear, currentMonth);
  const usedUrlaub = calcYearUrlaub(currentYear);
  const remainUrlaub = 30 - usedUrlaub;
  const diffSign = stats.diffMins >= 0 ? '+' : '';
  const diffClass = stats.diffMins >= 0 ? 'positive' : 'negative';
  let html = '';
  html += `<div class="stat-card ${diffClass}"><div class="label">Differenz</div><div class="value">${diffSign}${minsToTime(stats.diffMins)}</div><div class="sub">Soll: 174:00 Std</div></div>`;
  html += `<div class="stat-card"><div class="label">Gearbeitet</div><div class="value">${minsToTime(stats.workedMins)}</div><div class="sub">von 174:00 Std</div></div>`;
  html += `<div class="stat-card blue"><div class="label">Urlaub</div><div class="value">${stats.urlaubDays}</div><div class="sub">Tage im Monat</div></div>`;
  html += `<div class="stat-card"><div class="label">Krank</div><div class="value">${stats.krankDays}</div><div class="sub">Tage im Monat</div></div>`;
  html += `<div class="stat-card orange"><div class="label">Notdienst</div><div class="value">${stats.notdienstCount}×</div><div class="sub">${minsToTime(stats.notdienstMins)} Std</div></div>`;
  html += `<div class="stat-card orange"><div class="label">Überstunden</div><div class="value">${minsToTime(stats.notdienstMins)}</div><div class="sub">aus Notdienst</div></div>`;
  html += `<div class="stat-card cyan"><div class="label">Urlaub Saldo</div><div class="value">${remainUrlaub}</div><div class="sub">von 30 Tagen übrig</div><div class="urlaub-bar"><div class="fill ${remainUrlaub<=5?'warn':''}" style="width:${Math.min(100,(usedUrlaub/30)*100)}%"></div></div></div>`;
  document.getElementById('summaryCards').innerHTML = html;
}

function renderDays() {
  const dim = new Date(currentYear, currentMonth+1, 0).getDate();
  let html = '';
  for (let d = 1; d <= dim; d++) {
    const ds = dateStr(currentYear, currentMonth, d);
    const dt = new Date(ds);
    const dow = dt.getDay();
    const status = getDayStatus(ds);
    const we = isWeekend(dow);
    const times = getDayTimes(ds);
    const note = userNotes[ds];
    const ndArr = userNotdienst[ds] || [];
    const holidayName = getHolidayName(ds, currentYear);
    let cls = 'day-item';
    if (we) cls += ' weekend';
    if (status === 'Urlaub') cls += ' urlaub';
    if (status === 'Krank') cls += ' krank';
    if (status === 'Feiertag') cls += ' feiertag';
    if (ndArr.length > 0) cls += ' notdienst-day';
    let statusLabel = '', statusCls = '';
    if (status === 'Arbeiten') { statusLabel = '✅ Arbeiten'; statusCls = 'arbeiten'; }
    else if (status === 'Urlaub') { statusLabel = '🏖 Urlaub'; statusCls = 'urlaub'; }
    else if (status === 'Krank') { statusLabel = '🤒 Krank'; statusCls = 'krank'; }
    else if (status === 'Feiertag') { statusLabel = '🎉 ' + (holidayName || 'Feiertag'); statusCls = 'feiertag'; }
    html += `<div class="${cls}" onclick="onDayClick('${ds}')">`;
    html += `<div class="day-row"><div><span class="day-date">${d}</span> <span class="day-name">${DAY_NAMES_FULL[dow]}</span></div>`;
    if (statusLabel) html += `<span class="day-status ${statusCls}">${statusLabel}</span>`;
    html += `</div>`;
    if (status === 'Arbeiten' && times && times.start) {
      html += `<div class="time-strip"><span class="time-chip">▶ ${times.start}</span><span class="time-chip">⏸ ${times.pause||'00:00'}</span><span class="time-chip">⏹ ${times.end}</span><span class="time-chip">= ${times.hours||calcHours(times.start,times.end,times.pause)}</span></div>`;
    }
    // Notdienst entries
    for (let i = 0; i < ndArr.length; i++) {
      const nd = ndArr[i];
      html += `<div class="nd-entry">🚨 Notdienst ${i+1}`;
      if (nd.start && nd.end) html += ` <span class="nd-times">${nd.start} → ${nd.end} = ${calcHours(nd.start, nd.end, '00:00')}</span>`;
      if (nd.desc) html += ` <span class="nd-desc">— ${nd.desc}</span>`;
      html += ` <span style="cursor:pointer;margin-left:6px" onclick="event.stopPropagation();editNd('${ds}',${i})">✏️</span>`;
      html += ` <span style="cursor:pointer;margin-left:4px" onclick="event.stopPropagation();deleteNd('${ds}',${i})">🗑</span>`;
      html += `</div>`;
    }
    if (ndArr.length < 6) {
      html += `<button class="add-nd-btn" onclick="event.stopPropagation();openNd('${ds}',-1)">+ Notdienst hinzufügen</button>`;
    }
    if (note) html += `<div class="note-indicator">📝 ${note}</div>`;
    html += `</div>`;
  }
  document.getElementById('daysTab').innerHTML = html;
}

function renderJahres() {
  let totalDiff = 0, totalWorked = 0;
  let html = '<div class="jahres-cards">';
  let monthsData = [];
  for (let m = 0; m < 12; m++) {
    const s = calcMonthStats(currentYear, m);
    totalDiff += s.diffMins;
    totalWorked += s.workedMins;
    monthsData.push(s);
  }
  const diffSign = totalDiff >= 0 ? '+' : '';
  const diffClass = totalDiff >= 0 ? 'positive' : 'negative';
  html += `<div class="jahres-stat"><div class="jlabel">Differenz Gesamt</div><div class="jvalue" style="color:${totalDiff>=0?'var(--green)':'var(--red)'}">${diffSign}${minsToTime(totalDiff)}</div></div>`;
  html += `<div class="jahres-stat"><div class="jlabel">Gearbeitet Gesamt</div><div class="jvalue">${minsToTime(totalWorked)}</div></div>`;
  html += '</div>';
  for (let m = 0; m < 12; m++) {
    const s = monthsData[m];
    const pct = s.standardMins > 0 ? Math.min(100, (s.workedMins / s.standardMins) * 100) : 0;
    const mDiffSign = s.diffMins >= 0 ? '+' : '';
    html += `<div class="month-bar" onclick="currentMonth=${m};switchTab('tage')">`;
    html += `<div class="month-bar-header"><span class="month-bar-name">${MONTH_NAMES[m]}</span><span class="month-bar-diff" style="color:${s.diffMins>=0?'var(--green)':'var(--red)'}">${mDiffSign}${minsToTime(s.diffMins)}</span></div>`;
    html += `<div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>`;
    html += `</div>`;
  }
  document.getElementById('jahresTab').innerHTML = html;
}

// ===== ENTRY MODAL =====
function onDayClick(ds) {
  editingDate = ds;
  const status = getDayStatus(ds);
  selectedStatus = status || 'Arbeiten';
  const times = getDayTimes(ds);
  const d = new Date(ds);
  document.getElementById('entryTitle').textContent = d.getDate() + '. ' + MONTH_NAMES[d.getMonth()] + ' ' + d.getFullYear();
  updateStatusBtns();
  const locked = ['Urlaub','Krank','Feiertag'].includes(selectedStatus);
  const els = {start: document.getElementById('entryStart'), end: document.getElementById('entryEnd'), pause: document.getElementById('entryPause'), calc: document.getElementById('entryCalc')};
  // Reset disabled first
  els.start.disabled = false; els.end.disabled = false; els.pause.disabled = false;
  // Set values
  els.start.value = times.start || '';
  els.end.value = times.end || '';
  els.pause.value = times.pause || '';
  els.calc.value = times.hours || calcHours(times.start, times.end, times.pause);
  // Then lock if needed
  if (locked) { els.start.disabled = true; els.end.disabled = true; els.pause.disabled = true; }
  document.getElementById('entryNote').value = userNotes[ds] || '';
  document.getElementById('entryModal').classList.add('active');
}

function closeEntry() { document.getElementById('entryModal').classList.remove('active'); }

function updateStatusBtns() {
  document.querySelectorAll('.status-btn').forEach(b => {
    const s = b.textContent.includes('Arbeiten') ? 'Arbeiten' : b.textContent.includes('Urlaub') ? 'Urlaub' : b.textContent.includes('Krank') ? 'Krank' : 'Feiertag';
    b.classList.toggle('active', s === selectedStatus);
  });
}

function selectStatus(s) {
  selectedStatus = s;
  updateStatusBtns();
  const locked = ['Urlaub','Krank','Feiertag'].includes(s);
  const els = {start: document.getElementById('entryStart'), end: document.getElementById('entryEnd'), pause: document.getElementById('entryPause'), calc: document.getElementById('entryCalc')};
  els.start.disabled = false; els.end.disabled = false; els.pause.disabled = false;
  if (s === 'Arbeiten') {
    const st = getStandardTimes(editingDate);
    els.start.value = st.start; els.end.value = st.end; els.pause.value = st.pause;
    els.calc.value = st.hours || calcHours(st.start, st.end, st.pause);
  } else {
    els.start.value = URLAUB_KRANK_TIMES.start; els.end.value = URLAUB_KRANK_TIMES.end; els.pause.value = URLAUB_KRANK_TIMES.pause;
    els.calc.value = URLAUB_KRANK_TIMES.hours;
  }
  if (locked) { els.start.disabled = true; els.end.disabled = true; els.pause.disabled = true; }
  // Auto-save
  autoSaveEntry();
}

function autoSaveEntry() {
  if (!editingDate) return;
  userData[editingDate] = selectedStatus;
  const locked = ['Urlaub','Krank','Feiertag'].includes(selectedStatus);
  if (locked) {
    userTimes[editingDate] = {...URLAUB_KRANK_TIMES};
  } else {
    const s = document.getElementById('entryStart').value;
    const e = document.getElementById('entryEnd').value;
    const p = document.getElementById('entryPause').value;
    const h = calcHours(s, e, p);
    userTimes[editingDate] = {start:s, pause:p, end:e, hours:h};
    document.getElementById('entryCalc').value = h;
  }
  const note = document.getElementById('entryNote').value.trim();
  if (note) userNotes[editingDate] = note; else delete userNotes[editingDate];
  saveAllData();
  render();
}

// ===== NOTDIENST MODAL =====
function openNd(ds, idx) {
  ndEditDate = ds; ndEditIndex = idx;
  const d = new Date(ds);
  document.getElementById('ndTitle').textContent = '🚨 Notdienst — ' + d.getDate() + '. ' + MONTH_NAMES[d.getMonth()];
  if (idx >= 0 && userNotdienst[ds] && userNotdienst[ds][idx]) {
    const nd = userNotdienst[ds][idx];
    document.getElementById('ndStart').value = nd.start || '';
    document.getElementById('ndEnd').value = nd.end || '';
    document.getElementById('ndDesc').value = nd.desc || '';
  } else {
    document.getElementById('ndStart').value = '';
    document.getElementById('ndEnd').value = '';
    document.getElementById('ndDesc').value = '';
  }
  updateNdCalc();
  document.getElementById('ndModal').classList.add('active');
}

function closeNd() { document.getElementById('ndModal').classList.remove('active'); }

function updateNdCalc() {
  const s = document.getElementById('ndStart').value;
  const e = document.getElementById('ndEnd').value;
  document.getElementById('ndCalc').textContent = (s && e) ? calcHours(s, e, '00:00') : '00:00';
}

function saveNd() {
  if (!ndEditDate) return;
  if (!userNotdienst[ndEditDate]) userNotdienst[ndEditDate] = [];
  const entry = {
    start: document.getElementById('ndStart').value,
    end: document.getElementById('ndEnd').value,
    desc: document.getElementById('ndDesc').value.trim()
  };
  if (ndEditIndex >= 0) {
    userNotdienst[ndEditDate][ndEditIndex] = entry;
  } else {
    userNotdienst[ndEditDate].push(entry);
  }
  saveAllData();
  closeNd();
  render();
}

function editNd(ds, idx) { openNd(ds, idx); }

function deleteNd(ds, idx) {
  if (!userNotdienst[ds]) return;
  userNotdienst[ds].splice(idx, 1);
  if (userNotdienst[ds].length === 0) delete userNotdienst[ds];
  saveAllData();
  render();
}

// ===== SCAN =====
function openScan() { document.getElementById('scanModal').classList.add('active'); }
function closeScan() { document.getElementById('scanModal').classList.remove('active'); }
function handleScan(input) {
  if (!input.files || !input.files[0]) return;
  closeScan();
  alert('Foto wurde aufgenommen. AI-Erkennung wird in einer zukünftigen Version verfügbar sein.');
}

// ===== DATEN =====
function openDaten() { document.getElementById('datenModal').classList.add('active'); }
function closeDaten() { document.getElementById('datenModal').classList.remove('active'); }

function doExport() {
  const data = JSON.stringify({ userData, userTimes, userNotes, userNotdienst }, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'arbeitszeit_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url);
  closeDaten();
}

function doSave() {
  doExport();
}

function doImport(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.userData) userData = data.userData;
      if (data.userTimes) userTimes = data.userTimes;
      if (data.userNotes) userNotes = data.userNotes;
      if (data.userNotdienst) userNotdienst = data.userNotdienst;
      saveAllData();
      render();
      alert('Daten erfolgreich importiert!');
    } catch(err) { alert('Fehler beim Importieren: ' + err.message); }
  };
  reader.readAsText(input.files[0]);
  closeDaten();
}

// ===== EVENT LISTENERS =====
document.addEventListener('DOMContentLoaded', function() {
  // Time input auto-save
  ['entryStart','entryEnd','entryPause'].forEach(id => {
    document.getElementById(id).addEventListener('change', autoSaveEntry);
  });
  document.getElementById('entryNote').addEventListener('input', autoSaveEntry);
  // Notdienst calc
  ['ndStart','ndEnd'].forEach(id => {
    document.getElementById(id).addEventListener('change', updateNdCalc);
  });
  // Init
  initData();
});
</script>
