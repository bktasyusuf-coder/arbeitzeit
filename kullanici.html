<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Arbeitszeiterfassung</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #22222d;
    --border: #2e2e3d;
    --accent: #7c6af7;
    --accent2: #c084fc;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
    --text: #e8e8f0;
    --orange: #fb923c;
    --muted: #6b6b80;
    --radius: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; overflow-x:hidden; }

  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    padding: 24px 20px 16px;
    position: sticky; top:0; z-index:100;
    border-bottom: 1px solid var(--border);
  }
  .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .logo { font-size:13px; font-weight:700; color:var(--accent2); letter-spacing:0.12em; text-transform:uppercase; }
  .year-btn {
    background:var(--surface2); border:1px solid var(--border); color:var(--muted);
    padding:5px 10px; border-radius:8px; font-family:'Syne',sans-serif;
    font-size:12px; font-weight:700; cursor:pointer; transition:all 0.2s;
  }
  .year-btn.active-year { background:var(--accent); border-color:var(--accent); color:white; }
  .year-badge { background:var(--accent); color:white; font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; }
  .month-nav { display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .month-title { font-size:26px; font-weight:800; letter-spacing:-0.02em; flex:1; text-align:center; }
  .nav-btn {
    background:var(--surface2); border:1px solid var(--border); color:var(--text);
    width:38px; height:38px; border-radius:10px; cursor:pointer; font-size:18px;
    display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0;
  }
  .nav-btn:active { transform:scale(0.92); background:var(--accent); }
  .today-btn {
    background:var(--surface2); border:1px solid var(--accent); color:var(--accent2);
    padding:6px 12px; border-radius:8px; cursor:pointer; font-family:'Syne',sans-serif;
    font-size:11px; font-weight:700; transition:all 0.2s;
  }
  .today-btn:active { background:var(--accent); color:white; }

  .summary { padding:14px 16px 0; display:flex; gap:10px; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none; padding-bottom:4px; }
  .summary::-webkit-scrollbar { display:none; }
  .summary .card { min-width:140px; flex-shrink:0; flex:1; }
  .card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px; position:relative; overflow:hidden;
  }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:var(--radius) var(--radius) 0 0; }
  .card.green::before { background:var(--green); }
  .card.red::before { background:var(--red); }
  .card.blue::before { background:var(--blue); }
  .card.yellow::before { background:var(--yellow); }
  .card.purple::before { background:var(--accent2); }
  .card-label { font-size:10px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:6px; }
  .card-value { font-family:'DM Mono',monospace; font-size:20px; font-weight:500; line-height:1; }
  .card-value.green { color:var(--green); }
  .card-value.red { color:var(--red); }
  .card-value.blue { color:var(--blue); }
  .card-value.yellow { color:var(--yellow); }
  .card-value.purple { color:var(--accent2); }
  .card-sub { font-size:11px; color:var(--muted); margin-top:4px; font-family:'DM Mono',monospace; }

  .tabs { display:flex; padding:14px 16px 0; gap:8px; }
  .tab {
    flex:1; padding:9px 8px; border-radius:10px; border:1px solid var(--border);
    background:var(--surface); color:var(--muted); font-family:'Syne',sans-serif;
    font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; text-align:center;
  }
  .tab.active { background:var(--accent); border-color:var(--accent); color:white; }

  .day-list { padding:12px 16px 100px; }
  .day-entry {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    margin-bottom:8px; overflow:hidden; transition:all 0.2s;
  }
  .day-entry.today { border-color:var(--accent); }
  .day-entry.weekend { opacity:1; }
  .day-entry.feiertag { border-color:var(--yellow); }
  .day-entry.notdienst { border-color:var(--orange); }
  .day-entry.urlaub { border-color:var(--blue); }
  .day-entry.krank { border-color:var(--red); }
  .day-header { display:flex; align-items:center; padding:12px 14px; gap:12px; cursor:pointer; }
  .day-num { font-family:'DM Mono',monospace; font-size:20px; font-weight:500; color:var(--muted); width:28px; text-align:center; flex-shrink:0; }
  .day-entry.today .day-num { color:var(--accent2); }
  .day-info { flex:1; }
  .day-name { font-size:12px; color:var(--muted); font-weight:600; }
  .day-status { font-size:13px; font-weight:700; margin-top:1px; }
  .status-arbeiten { color:var(--green); }
  .status-urlaub { color:var(--blue); }
  .status-krank { color:var(--red); }
  .status-feiertag { color:var(--yellow); }
  .status-notdienst { color:var(--orange); }
  .status-frei { color:var(--muted); }
  .day-hours { font-family:'DM Mono',monospace; font-size:14px; font-weight:500; text-align:right; flex-shrink:0; }

  .time-strip { display:flex; gap:6px; padding:0 14px 12px; flex-wrap:wrap; }
  .time-chip {
    background:var(--surface2); border:1px solid var(--border); border-radius:8px;
    padding:5px 10px; font-family:'DM Mono',monospace; font-size:11px;
    display:flex; align-items:center; gap:5px;
  }
  .chip-label { color:var(--muted); font-size:10px; }
  .chip-val { color:var(--text); font-weight:500; }

  .year-view { padding:12px 16px 100px; }
  .month-row {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px; margin-bottom:8px; display:flex; align-items:center; gap:12px;
    cursor:pointer; transition:all 0.15s;
  }
  .month-row:active { transform:scale(0.98); }
  .month-row.active-month { border-color:var(--accent); background:#1e1b38; }
  .month-name { font-size:15px; font-weight:700; flex:1; }
  .month-stats { display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
  .stat-pill { font-family:'DM Mono',monospace; font-size:11px; display:flex; align-items:center; gap:4px; }
  .stat-pill .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .dot-green { background:var(--green); }
  .dot-red { background:var(--red); }
  .dot-blue { background:var(--blue); }
  .diff-pos { color:var(--green); font-family:'DM Mono',monospace; font-size:12px; font-weight:500; }
  .diff-neg { color:var(--red); font-family:'DM Mono',monospace; font-size:12px; font-weight:500; }

  /* JAHRESÜBERSICHT */
  .year-summary-view { padding:12px 16px 100px; }
  .ys-header { font-size:22px; font-weight:800; margin-bottom:16px; }
  .ys-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:20px; }
  .ys-card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px; position:relative; overflow:hidden;
  }
  .ys-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
  .ys-card.green::before { background:var(--green); }
  .ys-card.red::before { background:var(--red); }
  .ys-card.blue::before { background:var(--blue); }
  .ys-card.yellow::before { background:var(--yellow); }
  .ys-label { font-size:10px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; }
  .ys-value { font-family:'DM Mono',monospace; font-size:24px; font-weight:500; }
  .ys-value.green { color:var(--green); }
  .ys-value.red { color:var(--red); }
  .ys-value.blue { color:var(--blue); }
  .ys-value.yellow { color:var(--yellow); }
  .ys-sub { font-size:11px; color:var(--muted); margin-top:4px; font-family:'DM Mono',monospace; }
  .month-bar-list { }
  .month-bar-item { margin-bottom:12px; }
  .month-bar-label { display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px; }
  .month-bar-name { font-weight:700; }
  .month-bar-val { font-family:'DM Mono',monospace; color:var(--muted); font-size:11px; }
  .bar-track { background:var(--surface2); border-radius:4px; height:6px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:4px; transition:width 0.5s ease; }
  .bar-pos { background:var(--green); }
  .bar-neg { background:var(--red); }

  .bottom-nav {
    position:fixed; bottom:0; left:0; right:0;
    background:rgba(15,15,19,0.95); backdrop-filter:blur(12px);
    border-top:1px solid var(--border); display:flex; padding:10px 16px 20px; gap:8px;
  }
  .bnav-btn {
    flex:1; padding:8px 4px; border-radius:12px; border:1px solid var(--border);
    background:var(--surface); color:var(--muted); font-family:'Syne',sans-serif;
    font-size:10px; font-weight:700; cursor:pointer; transition:all 0.2s;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    text-transform:uppercase; letter-spacing:0.05em;
  }
  .bnav-btn.active { background:var(--accent); border-color:var(--accent); color:white; }
  .bnav-icon { font-size:16px; }

  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200;
    display:none; align-items:flex-end;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--surface); border:1px solid var(--border); border-radius:20px 20px 0 0;
    width:100%; padding:24px 20px 40px; max-height:85vh; overflow-y:auto;
    animation:slideUp 0.3s ease;
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
  .modal-title { font-size:20px; font-weight:800; margin-bottom:20px; }
  .form-group { margin-bottom:16px; }
  .form-label { font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; display:block; }
  .form-input {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; padding:12px 14px; color:var(--text);
    font-family:'DM Mono',monospace; font-size:15px; outline:none; -webkit-appearance:none;
  }
  .form-input:focus { border-color:var(--accent); }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .status-btns { display:flex; gap:8px; flex-wrap:wrap; }
  .status-btn {
    padding:9px 14px; border-radius:8px; border:1px solid var(--border);
    background:var(--surface2); color:var(--muted); font-family:'Syne',sans-serif;
    font-size:12px; font-weight:700; cursor:pointer; transition:all 0.2s;
  }
  .status-btn.sel-arbeiten { background:rgba(52,211,153,0.15); border-color:var(--green); color:var(--green); }
  .status-btn.sel-urlaub { background:rgba(96,165,250,0.15); border-color:var(--blue); color:var(--blue); }
  .status-btn.sel-krank { background:rgba(248,113,113,0.15); border-color:var(--red); color:var(--red); }
  .status-btn.sel-feiertag { background:rgba(251,191,36,0.15); border-color:var(--yellow); color:var(--yellow); }
  .status-btn.sel-notdienst { background:rgba(251,146,60,0.15); border-color:var(--orange); color:var(--orange); }
  .status-btn.sel-frei { background:rgba(107,107,128,0.2); border-color:var(--muted); color:var(--muted); }
  .save-btn {
    width:100%; padding:16px; background:var(--accent); border:none; border-radius:12px;
    color:white; font-family:'Syne',sans-serif; font-size:15px; font-weight:800;
    cursor:pointer; margin-top:8px; transition:all 0.2s;
  }
  .save-btn:active { transform:scale(0.97); background:var(--accent2); }
  .cancel-btn {
    width:100%; padding:14px; background:transparent; border:1px solid var(--border);
    border-radius:12px; color:var(--muted); font-family:'Syne',sans-serif;
    font-size:14px; font-weight:600; cursor:pointer; margin-top:8px;
  }
  .today-indicator {
    width:7px; height:7px; background:var(--accent2); border-radius:50%;
    display:inline-block; margin-left:6px; animation:pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  .holiday-name { font-size:10px; color:var(--yellow); margin-top:1px; }
  .sync-status { transition:color 0.3s; }
  .sync-status.synced { color:var(--green)!important; }
  .sync-status.error { color:var(--red)!important; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="logo" id="logoText">⏱ Arbeitszeit</span>
    <div style="display:flex;gap:6px">
      <button onclick="setYear(2026)" id="ybtn2026" class="year-btn active-year">2026</button>
      <button onclick="setYear(2027)" id="ybtn2027" class="year-btn">2027</button>
      <button onclick="setYear(2028)" id="ybtn2028" class="year-btn">2028</button>
    </div>
    <button class="today-btn" onclick="goToToday()">📍 Heute</button>
  </div>
  <div class="month-nav">
    <button class="nav-btn" onclick="prevMonth()">‹</button>
    <span class="month-title" id="monthTitle">Januar</span>
    <button class="nav-btn" onclick="nextMonth()">›</button>
  </div>
  <div id="syncStatus" class="sync-status" style="text-align:center;font-size:10px;color:var(--muted);margin-top:6px">Verbinde...</div>
</div>

<div id="mainView">
  <div class="summary" id="summaryCards"></div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('days',this)">Tage</div>
    <div class="tab" onclick="switchTab('jahres',this)">📊 Jahresübersicht</div>
  </div>
  <div id="daysTab" class="day-list"></div>
  <div id="jahresTab" class="year-summary-view" style="display:none"></div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="bnav-btn active" onclick="setView('month',this)">
    <span class="bnav-icon">📅</span>Monat
  </button>
  <button class="bnav-btn" onclick="openPhotoScan()">
    <span class="bnav-icon">📷</span>Scannen
  </button>
  <button class="bnav-btn" onclick="exportAndSave()">
    <span class="bnav-icon">💾</span>Speichern
  </button>
  <button class="bnav-btn" onclick="document.getElementById('importInput').click()">
    <span class="bnav-icon">📥</span>Import
    <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
  </button>
</div>

<!-- Photo Scan Modal -->
<div class="modal-overlay" id="photoModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:center;align-items:center;margin-bottom:16px;gap:12px;position:relative">
      <div style="font-size:20px;font-weight:800;text-align:center">📷 Foto scannen</div>
      <button onclick="closePhotoModal()" style="position:absolute;right:0;background:var(--accent);border:none;color:white;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif">Schließen</button>
    </div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px;line-height:1.5">Tabelle fotografieren — KI liest automatisch ein.</p>
    <div id="photoPreviewArea" style="display:none;margin-bottom:16px">
      <img id="photoPreview" style="width:100%;border-radius:10px;border:1px solid var(--border);max-height:220px;object-fit:cover;">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <div style="border:2px dashed var(--border);border-radius:12px;padding:20px 10px;text-align:center;cursor:pointer" onclick="document.getElementById('photoCamera').click()">
        <div style="font-size:28px;margin-bottom:6px">📷</div>
        <div style="font-size:12px;font-weight:700">Kamera</div>
        <input type="file" id="photoCamera" accept="image/*" capture="environment" style="display:none" onchange="onPhotoSelected(event)">
      </div>
      <div style="border:2px dashed var(--border);border-radius:12px;padding:20px 10px;text-align:center;cursor:pointer" onclick="document.getElementById('photoGallery').click()">
        <div style="font-size:28px;margin-bottom:6px">🖼️</div>
        <div style="font-size:12px;font-weight:700">Galerie</div>
        <input type="file" id="photoGallery" accept="image/*" style="display:none" onchange="onPhotoSelected(event)">
      </div>
    </div>
    <div id="scanResult" style="display:none">
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;max-height:200px;overflow-y:auto">
        <div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:8px">KI-Ergebnis</div>
        <div id="scanResultText" style="font-size:13px;line-height:1.6;font-family:'DM Mono',monospace;white-space:pre-wrap"></div>
      </div>
      <button class="save-btn" onclick="applyScanResult()" id="applyBtn">✅ Übernehmen</button>
    </div>
    <div id="scanLoading" style="display:none;text-align:center;padding:20px">
      <div style="font-size:32px;margin-bottom:8px;animation:spin 1s linear infinite">⏳</div>
      <div style="font-size:14px;color:var(--muted)">KI liest...</div>
    </div>
  </div>
</div>

<!-- Daten Modal (Export + Import) -->
<div class="modal-overlay" id="datenModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:center;align-items:center;margin-bottom:24px;gap:12px;position:relative">
      <div style="font-size:20px;font-weight:800;text-align:center">🗂 Datenverwaltung</div>
      <button onclick="closeDatenModal()" style="position:absolute;right:0;background:var(--accent);border:none;color:white;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif">Schließen</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <button onclick="exportData()" style="background:rgba(52,211,153,0.1);border:1px solid var(--green);border-radius:14px;padding:24px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px">
        <span style="font-size:32px">💾</span>
        <span style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--green)">Export</span>
        <span style="font-size:11px;color:var(--muted);font-family:'Syne',sans-serif">Daten sichern</span>
      </button>
      <button onclick="document.getElementById('importInput').click()" style="background:rgba(96,165,250,0.1);border:1px solid var(--blue);border-radius:14px;padding:24px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px">
        <span style="font-size:32px">📂</span>
        <span style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--blue)">Import</span>
        <span style="font-size:11px;color:var(--muted);font-family:'Syne',sans-serif">Daten laden</span>
      </button>
    </div>
    <div style="margin-top:12px">
      <button onclick="exportAndSave()" style="width:100%;background:rgba(124,106,247,0.1);border:1px solid var(--accent);border-radius:14px;padding:16px;cursor:pointer;display:flex;align-items:center;gap:12px">
        <span style="font-size:28px">📲</span>
        <div style="text-align:left">
          <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--accent2)">Speichern</div>
          <div style="font-size:11px;color:var(--muted);font-family:'Syne',sans-serif;margin-top:2px">Backup automatisch herunterladen</div>
        </div>
      </button>
    </div>
  </div>
</div>


<!-- Notdienst Modal -->
<div class="modal-overlay" id="notdienstModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:10px">
      <div style="font-size:20px;font-weight:800">🚨 Notdienst</div>
      <button onclick="closeNotdienst()" style="background:var(--orange);border:none;color:white;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif">Schließen</button>
    </div>
    <div id="ndDateLabel" style="font-size:13px;color:var(--muted);margin-bottom:16px"></div>
    <div class="form-row" style="grid-template-columns:1fr 1fr 1fr">
      <div class="form-group">
        <label class="form-label">Start</label>
        <input type="time" class="form-input" id="ndStart">
      </div>
      <div class="form-group">
        <label class="form-label">Ende</label>
        <input type="time" class="form-input" id="ndEnd">
      </div>
      <div class="form-group">
        <label class="form-label">Arbeitszeit</label>

// Hannover 2026 Resmi Tatilleri


// Yıl verilerini runtime'da üret
function calcEaster(year) {
  const a=year%19,b=Math.floor(year/100),c=year%100,d=Math.floor(b/4),e=b%4;
  const f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3);
  const h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4;
  const l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451);
  const month=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;
  return new Date(year,month-1,day);
}

function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function buildYearData(year) {
  const easter = calcEaster(year);
  const feiertage = {
    [year+'-01-01']:'Neujahr',
    [fmt(addDays(easter,-2))]:'Karfreitag',
    [fmt(addDays(easter,1))]:'Ostermontag',
    [year+'-05-01']:'Tag der Arbeit',
    [fmt(addDays(easter,39))]:'Christi Himmelfahrt',
    [fmt(addDays(easter,50))]:'Pfingstmontag',
    [year+'-10-03']:'Tag der Deutschen Einheit',
    [year+'-10-31']:'Reformationstag',
    [year+'-12-25']:'1. Weihnachtstag',
    [year+'-12-26']:'2. Weihnachtstag',
  };
  const STD = {
    1:{start:'07:45',pause:'01:00',end:'17:00',hours:'08:15'},
    2:{start:'07:45',pause:'01:00',end:'17:00',hours:'08:15'},
    3:{start:'07:45',pause:'01:00',end:'17:00',hours:'08:15'},
    4:{start:'07:45',pause:'01:00',end:'17:00',hours:'08:15'},
    5:{start:'07:45',pause:'00:30',end:'14:30',hours:'06:15'},
  };
  const days={}, times={};
  const d = new Date(year,0,1);
  while(d.getFullYear()===year){
    const ds = fmt(d);
    const dow = d.getDay();
    if(dow>0 && dow<6 && !feiertage[ds]){
      days[ds]='Arbeiten';
      times[ds]={...STD[dow]};
    }
    d.setDate(d.getDate()+1);
  }
  return {feiertage, days, times};
}

const YEAR_DATA = {
  2026: buildYearData(2026),
  2027: buildYearData(2027),
  2028: buildYearData(2028),
};

// Standart saatler
const STANDARD_TIMES = {
  1: {start:'07:45', pause:'01:00', end:'17:00', hours:'08:15'}, // Montag
  2: {start:'07:45', pause:'01:00', end:'17:00', hours:'08:15'}, // Dienstag
  3: {start:'07:45', pause:'01:00', end:'17:00', hours:'08:15'}, // Mittwoch
  4: {start:'07:45', pause:'01:00', end:'17:00', hours:'08:15'}, // Donnerstag
  5: {start:'07:45', pause:'00:30', end:'14:30', hours:'06:15'}, // Freitag
};

// Urlaub / Krank saatleri
const URLAUB_KRANK_TIMES = {start:'08:00', pause:'01:00', end:'17:00', hours:'08:00'};

function getStandardTimes(dateStr) {
  const d = new Date(dateStr);
  const dow = d.getDay();
  const year = parseInt(dateStr.split('-')[0]);
  const yd = YEAR_DATA[year] || {};
  if (yd.feiertage && yd.feiertage[dateStr]) return URLAUB_KRANK_TIMES;
  return STANDARD_TIMES[dow] || null;
}

function getStatusDefaultTimes(status, dateStr) {
  if (status === 'Urlaub' || status === 'Krank' || status === 'Feiertag') return URLAUB_KRANK_TIMES;
  if (status === 'Notdienst') return {start:'', pause:'', end:'', hours:''};
  return getStandardTimes(dateStr);
}

function getDayStatus(dateStr) {

  const yd = YEAR_DATA[year] || {};

}

function getDayTimes(dateStr) {

  const yd = YEAR_DATA[year] || {};
  return userTimes[dateStr] || (yd.times && yd.times[dateStr]) || getStandardTimes(dateStr) || null;

function getDaysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }
function getDayOfWeek(y, m, d) { return new Date(y, m, d).getDay(); }
function isWeekend(dow) { return dow === 0 || dow === 6; }
function isToday(y, m, d) {
  const t = new Date();
  return t.getFullYear()===y && t.getMonth()===m && t.getDate()===d;
}

function timeToMins(t) {
  if (!t || t === '--:--' || t === '') return 0;
  const parts = t.replace('-','').split(':').map(Number);
  if (parts.length < 2 || isNaN(parts[0]) || isNaN(parts[1])) return 0;
  const result = parts[0]*60 + parts[1];
  return t.startsWith('-') ? -result : result;
}

function minsToTime(m) {
  const h = Math.floor(Math.abs(m)/60), mm = Math.abs(m)%60;
  return `${m<0?'-':''}${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}

function calcWorkHours(start, pause, end) {
  if (!start || !end) return '';
  let mins = timeToMins(end) - timeToMins(start) - timeToMins(pause||'00:00');
  if (mins < 0) return '';
  return minsToTime(mins);
}

// Ay istatistikleri hesapla
function calcMonthStats(year, month) {
  const mk = `${year}-${String(month+1).padStart(2,'0')}`;
  const total = getDaysInMonth(year, month);
  let workedMins = 0, urlaub = 0, krank = 0, feiertage = 0, notdienst = 0, arbeitstage = 0;

  for (let d = 1; d <= total; d++) {
    const dateStr = `${mk}-${String(d).padStart(2,'0')}`;
    const dow = getDayOfWeek(year, month, d);
    const weekend = isWeekend(dow);
    const status = getDayStatus(dateStr);
    const times = getDayTimes(dateStr);

    // Hafta sonu sadece Notdienst sayısını say, workedMins'e ekleme
    if (weekend) {
      if (userNotdienst[dateStr]) {
        const arr = Array.isArray(userNotdienst[dateStr]) ? userNotdienst[dateStr] : [userNotdienst[dateStr]];
        notdienst += arr.length;
      }
      continue;
    }

    arbeitstage++;

    if (status === 'Urlaub') { urlaub++; workedMins += 8*60; }
    else if (status === 'Krank') { krank++; workedMins += 8*60; }
    else if (status === 'Feiertag') { feiertage++; workedMins += 8*60; }
    else if (status === 'Arbeiten') {
      if (times && times.hours) workedMins += timeToMins(times.hours);
      else {
        const std = STANDARD_TIMES[dow];
        if (std) workedMins += timeToMins(std.hours);
      }
    }
    // Notdienst sayısını say ama workedMins'e ekleme — ayrı Überstunden olarak gösterilecek
    if (userNotdienst[dateStr]) {
      const arr = Array.isArray(userNotdienst[dateStr]) ? userNotdienst[dateStr] : [userNotdienst[dateStr]];
      notdienst += arr.length;
    }
  }

  const standardMins = 174 * 60;
  const diffMins = workedMins - standardMins;
  return { workedMins, diffMins, urlaub, krank, feiertage, notdienst, arbeitstage, standardMins };
}

function calcNotdienstMins(year, month) {
  const mk = `${year}-${String(month+1).padStart(2,'0')}`;
  let t = 0;
  for (let d = 1; d <= getDaysInMonth(year, month); d++) {
    const ds = `${mk}-${String(d).padStart(2,'0')}`;
    if (userNotdienst[ds]) {
      const arr = Array.isArray(userNotdienst[ds]) ? userNotdienst[ds] : [userNotdienst[ds]];
      arr.forEach(nd => { if (nd.hours) t += timeToMins(nd.hours); });
    }
  }
  return t;
}

function renderDays() {
  const total = getDaysInMonth(currentYear, currentMonth);
  let html = '';
  const mk = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;

  for (let d = 1; d <= total; d++) {
    const dow = getDayOfWeek(currentYear, currentMonth, d);
    const dateStr = `${mk}-${String(d).padStart(2,'0')}`;
    const status = getDayStatus(dateStr);
    const times = getDayTimes(dateStr);
    const weekend = isWeekend(dow);
    const today = isToday(currentYear, currentMonth, d);
    const yd = YEAR_DATA[currentYear] || {}; const holidayName = yd.feiertage && yd.feiertage[dateStr];

    let cls = 'day-entry';
    if (today) cls += ' today';
    if (weekend && !status) cls += ' weekend';
    if (status === 'Urlaub') cls += ' urlaub';
    if (status === 'Krank') cls += ' krank';
    if (status === 'Feiertag') cls += ' feiertag';
    if (status === 'Notdienst') cls += ' notdienst';

    let statusLabel = '—', statusCls = 'status-frei';
    if (status === 'Arbeiten') { statusLabel = '✓ Arbeiten'; statusCls = 'status-arbeiten'; }
    else if (status === 'Urlaub') { statusLabel = '🏖 Urlaub'; statusCls = 'status-urlaub'; }
    else if (status === 'Krank') { statusLabel = '🤒 Krank'; statusCls = 'status-krank'; }
    else if (status === 'Feiertag') { statusLabel = '🎉 Feiertag'; statusCls = 'status-feiertag'; }
    else if (status === 'Notdienst') { statusLabel = '🚨 Notdienst'; statusCls = 'status-notdienst'; }
    else if (weekend) { statusLabel = 'Wochenende'; statusCls = 'status-frei'; }

    const hoursStr = times && times.hours ? times.hours : '';

    html += `<div class="${cls}" onclick="onDayClick('${dateStr}',${d})">
      <div class="day-header">
        <div class="day-num">${d}${today?'<span class="today-indicator"></span>':''}</div>
        <div class="day-info">
          <div class="day-name">${DAYS_DE[dow]}</div>
          <div class="day-status ${statusCls}">${statusLabel}</div>
          ${holidayName ? `<div class="holiday-name">${holidayName}</div>` : ''}
        </div>
        <div class="day-hours">${hoursStr?`<span style="color:var(--green)">${hoursStr}</span>`:''}</div>
      </div>`;

    const hasRealTimes = times && (times.start || times.end);
    if (hasRealTimes && (status === 'Arbeiten' || status === 'Urlaub' || status === 'Krank' || status === 'Feiertag' || status === 'Notdienst' || userTimes[dateStr])) {
      html += `<div class="time-strip">
        <div class="time-chip"><span class="chip-label">Start</span><span class="chip-val">${times.start||'--:--'}</span></div>
        <div class="time-chip"><span class="chip-label">Pause</span><span class="chip-val">${times.pause||'--:--'}</span></div>
        <div class="time-chip"><span class="chip-label">Ende</span><span class="chip-val">${times.end||'--:--'}</span></div>
        ${times.hours?`<div class="time-chip"><span class="chip-label">Std</span><span class="chip-val" style="color:var(--orange)">${times.hours}</span></div>`:''}
      </div>`;
    }
    if (userNotes[dateStr]) {
      html += `<div style="padding:0 14px 10px;font-size:12px;color:var(--accent2);display:flex;gap:6px;align-items:flex-start">
        <span>📝</span><span style="line-height:1.4">${userNotes[dateStr]}</span>
      </div>`;
    }
    // Notdienst ayrı satırlar (max 6)
    const ndList = userNotdienst[dateStr] || [];
    const ndArr = Array.isArray(ndList) ? ndList : [ndList];
    ndArr.forEach((nd, idx) => {
      html += `<div style="padding:4px 14px 6px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--border)">
        <span style="font-size:11px;font-weight:700;color:var(--orange)">🚨 Nd ${ndArr.length>1?idx+1:''}</span>
        <div class="time-chip"><span class="chip-label">Start</span><span class="chip-val" style="color:var(--orange)">${nd.start||'--:--'}</span></div>
        <div class="time-chip"><span class="chip-label">Ende</span><span class="chip-val" style="color:var(--orange)">${nd.end||'--:--'}</span></div>
        <div class="time-chip"><span class="chip-label">Std</span><span class="chip-val" style="color:var(--orange)">${nd.hours||'--:--'}</span></div>
        ${nd.note?`<div class="time-chip"><span class="chip-val" style="color:var(--muted);font-size:10px">📝 ${nd.note}</span></div>`:''}
        <button onclick="event.stopPropagation();openNotdienst('${dateStr}',${idx})" style="margin-left:auto;background:var(--surface2);border:1px solid var(--orange);color:var(--orange);padding:4px 8px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer">✏️</button>
        <button onclick="event.stopPropagation();openBericht('${dateStr}')" style="background:var(--surface2);border:1px solid #ea4335;color:#ea4335;padding:4px 8px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer">📧</button>
      </div>`;
    });
    if (ndArr.length < 6 && (status === 'Arbeiten' || weekend || status === 'Feiertag')) {
      html += `<div style="padding:4px 14px 10px">
        <button onclick="event.stopPropagation();openNotdienst('${dateStr}',-1)" style="background:transparent;border:1px dashed var(--orange);color:var(--orange);padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;width:100%">+ Notdienst hinzufügen</button>
      </div>`;
    }
    html += '</div>';
  }
  document.getElementById('daysTab').innerHTML = html;
}

function renderJahres() {
  let totalWorked = 0, totalUrlaub = 0, totalKrank = 0, totalFeiertage = 0, totalNotdienst = 0, totalStandard = 0, totalNotdienstMins = 0;
  const monthData = [];

  for (let m = 0; m < 12; m++) {
    const stats = calcMonthStats(currentYear, m);
    totalWorked += stats.workedMins;
    totalUrlaub += stats.urlaub;
    totalKrank += stats.krank;
    totalFeiertage += stats.feiertage;
    totalNotdienst += stats.notdienst;
    totalNotdienstMins += calcNotdienstMins(currentYear, m);
    totalStandard += stats.standardMins;
    monthData.push({...stats, month: m});
  }

  const totalDiff = totalWorked - totalStandard;
  const isPos = totalDiff >= 0;
  const maxAbs = Math.max(...monthData.map(s => Math.abs(s.diffMins)), 1);

  const barsHtml = monthData.map((s) => {
    const pct = Math.min(100, Math.abs(s.diffMins) / maxAbs * 100);
    const pos = s.diffMins >= 0;
    const isCur = s.month === currentMonth;
    return `<div class="month-bar-item" onclick="goToMonthJahres(${s.month})" style="cursor:pointer;padding:8px 12px;border-radius:10px;background:${isCur?'var(--surface2)':'transparent'};margin-bottom:4px;">
      <div class="month-bar-label">
        <span class="month-bar-name" style="${isCur?'color:var(--accent2)':''}">${MONTHS[s.month].substring(0,3)}</span>
        <div style="display:flex;gap:10px;align-items:center">
          ${s.urlaub?`<span style="font-size:10px;color:var(--blue)">🏖 ${s.urlaub}T</span>`:''}
          ${s.krank?`<span style="font-size:10px;color:var(--red)">🤒 ${s.krank}T</span>`:''}
          <span class="month-bar-val" style="color:${pos?'var(--green)':'var(--red)'}">${pos?'+':''}${minsToTime(s.diffMins)}</span>
        </div>
      </div>
      <div class="bar-track"><div class="bar-fill ${pos?'bar-pos':'bar-neg'}" style="width:${pct}%"></div></div>
      <div style="font-size:10px;color:var(--muted);margin-top:3px;font-family:'DM Mono',monospace">${minsToTime(s.workedMins)} / ${minsToTime(s.standardMins)} Std</div>
    </div>`;
  }).join('');

  document.getElementById('jahresTab').innerHTML = `
    <div class="ys-header">📊 Jahresübersicht ${currentYear}</div>
    <div class="ys-grid">
      <div class="ys-card ${isPos?'green':'red'}">
        <div class="ys-label">Gesamtdifferenz</div>
        <div class="ys-value ${isPos?'green':'red'}">${isPos?'+':''}${minsToTime(totalDiff)}</div>
        <div class="ys-sub">Jahresstunden</div>
      </div>
      <div class="ys-card blue">
        <div class="ys-label">Gearbeitet</div>
        <div class="ys-value blue">${minsToTime(totalWorked)}</div>
        <div class="ys-sub">von ${minsToTime(totalStandard)}</div>
      </div>
      <div class="ys-card" style="border-top:3px solid var(--orange)">
        <div class="ys-label">Notdienst</div>
        <div class="ys-value" style="color:var(--orange)">${totalNotdienst} Mal</div>
        <div class="ys-sub">${minsToTime(totalNotdienstMins)} Std</div>
      </div>
      <div class="ys-card" style="border-top:3px solid var(--accent2)">
        <div class="ys-label">📈 Überstunden</div>
        <div class="ys-value" style="color:var(--accent2)">+${minsToTime(totalNotdienstMins)}</div>
        <div class="ys-sub">aus Notdienst</div>
      </div>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px;padding:0 4px">Zeile anklicken um zum Monat zu springen 👇</div>
    <div class="month-bar-list">${barsHtml}</div>
  `;
}

function goToMonthJahres(m) {
  currentMonth = m;
  switchTab('days', document.querySelectorAll('.tab')[0]);
  render();
}

// ─── NAVIGATION ─────────────────────────────────────────────────
function prevMonth() {
  currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } render();
}
function nextMonth() {
  currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } render();
}
function goToMonth(m) {
  currentMonth = m;
  switchTab('days', document.querySelectorAll('.tab')[0]);
  render();
}
function goToToday() {
  const t = new Date();
  currentYear = t.getFullYear() >= 2026 && t.getFullYear() <= 2028 ? t.getFullYear() : 2026;
  currentMonth = t.getMonth();
  document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active-year'));
  const yb = document.getElementById('ybtn'+currentYear);
  if(yb) yb.classList.add('active-year');
  switchTab('days', document.querySelectorAll('.tab')[0]);
  render();
  setTimeout(() => {
    const todayEl = document.querySelector('.day-entry.today');
    if (todayEl) todayEl.scrollIntoView({behavior:'smooth', block:'center'});
  }, 100);
}
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('daysTab').style.display = tab==='days'?'block':'none';
  document.getElementById('jahresTab').style.display = tab==='jahres'?'block':'none';
}
function setView(v, el) {
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

// ─── ENTRY MODAL ────────────────────────────────────────────────
function onDayClick(dateStr, day) {
  editingDate = dateStr;
  const status = getDayStatus(dateStr);
  const times = getDayTimes(dateStr);
  document.getElementById('modalTitle').textContent = `${day}. ${MONTHS[currentMonth]}`;
  document.getElementById('entryDate').value = dateStr;
  selectedStatus = status || 'Arbeiten';
  updateStatusBtns();
  const isNotdienst = selectedStatus === 'Notdienst';
  const locked = selectedStatus === 'Urlaub' || selectedStatus === 'Krank' || selectedStatus === 'Feiertag';

  let t = {};
  if (times && times.start) {
    t = times;
  } else if (!isNotdienst) {
    t = getStatusDefaultTimes(selectedStatus, dateStr) || getStandardTimes(dateStr) || {};
  }
  const _s = t.start || (isNotdienst ? '' : '07:45');
  const _p = t.pause || (isNotdienst ? '' : '01:00');
  const _e = t.end || (isNotdienst ? '' : '17:00');
  document.getElementById('entryNote').value = userNotes[dateStr] || '';
  document.getElementById('entryModal').classList.add('open');
  setTimeout(() => {
    document.getElementById('entryStart').value = _s;
    document.getElementById('entryPause').value = _p;
    document.getElementById('entryEnd').value = _e;
    setTimeFieldsLocked(locked);
    updateCalc();
  }, 50);
}

function openNewEntry() {
  editingDate = null;
  const today = new Date();
  const ds = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  document.getElementById('modalTitle').textContent = 'Neuer Eintrag';
  document.getElementById('entryDate').value = ds;
  selectedStatus = 'Arbeiten';
  updateStatusBtns();
  const std = getStandardTimes(ds) || {};
  document.getElementById('entryStart').value = std.start || '07:45';
  document.getElementById('entryPause').value = std.pause || '01:00';
  document.getElementById('entryEnd').value = std.end || '17:00';
  updateCalc();
  document.getElementById('entryModal').classList.add('open');
}

function closeModal() {
  document.getElementById('entryModal').classList.remove('open');
  editingDate = null;
}

function selectStatus(s) {
  selectedStatus = s;
  updateStatusBtns();
  const dateStr = document.getElementById('entryDate').value;
  const locked = s === 'Urlaub' || s === 'Krank' || s === 'Feiertag';

  const t = getStatusDefaultTimes(s, dateStr) || {};
  document.getElementById('entryStart').value = t.start || '07:45';
  document.getElementById('entryPause').value = t.pause || '01:00';
  document.getElementById('entryEnd').value = t.end || '17:00';
  setTimeFieldsLocked(locked);
  updateCalc();
  document.getElementById('timeFields').style.display = s==='Frei' ? 'none' : 'grid';
}

function setTimeFieldsLocked(locked) {
  ['entryStart','entryPause','entryEnd'].forEach(id => {
    const el = document.getElementById(id);
    el.style.opacity = locked ? '0.5' : '1';
    el.style.pointerEvents = locked ? 'none' : 'auto';
    el.readOnly = locked;
  });
}

function updateStatusBtns() {
  document.querySelectorAll('.status-btn').forEach(b => {
    b.className = 'status-btn';
    const s = b.textContent.trim().split(' ').pop();
    if (s === selectedStatus) b.className = `status-btn sel-${selectedStatus.toLowerCase()}`;
  });
  document.getElementById('timeFields').style.display = selectedStatus==='Frei' ? 'none' : 'grid';
}

function updateCalc() {
  const s = document.getElementById('entryStart').value;
  const p = document.getElementById('entryPause').value;
  const e = document.getElementById('entryEnd').value;
  document.getElementById('entryCalc').value = calcWorkHours(s,p,e) || '--:--';
}

function saveEntry() {
  const dateStr = document.getElementById('entryDate').value;
  if (!dateStr) return;
  userData[dateStr] = selectedStatus;
  if (selectedStatus !== 'Frei') {
    const locked = selectedStatus === 'Urlaub' || selectedStatus === 'Krank' || selectedStatus === 'Feiertag';
    if (locked) {
      userTimes[dateStr] = {start:'08:00', pause:'01:00', end:'17:00', hours:'08:00'};
    } else {
      userTimes[dateStr] = {
        start: document.getElementById('entryStart').value,
        pause: document.getElementById('entryPause').value,
        end: document.getElementById('entryEnd').value,
        hours: document.getElementById('entryCalc').value,
      };
    }
  } else {
    delete userTimes[dateStr];
  }
  const note = document.getElementById('entryNote').value.trim();
  if (note) userNotes[dateStr] = note;
  else delete userNotes[dateStr];
  saveData();
  closeModal();
  const parts = dateStr.split('-');
  currentYear = parseInt(parts[0]);
  currentMonth = parseInt(parts[1]) - 1;
  render();
}


// ─── NOTDIENST MODAL ────────────────────────────────────────────
let currentNdDate = null;
let currentNdIndex = -1;

function openNotdienst(dateStr, index) {
  currentNdDate = dateStr;
  currentNdIndex = index; // -1 = yeni ekle, >= 0 = düzenle
  const parts = dateStr.split('-');
  const d = new Date(dateStr);
  const DAYS = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  const ndArr = userNotdienst[dateStr] || [];
  const arr = Array.isArray(ndArr) ? ndArr : [ndArr];
  const nd = index >= 0 ? (arr[index] || {}) : {};
  const count = arr.length;
  document.getElementById('ndDateLabel').textContent = `${DAYS[d.getDay()]}, ${parts[2]}.${parts[1]}.${parts[0]}${index>=0 ? ` — Eintrag ${index+1}` : ` — Neu (${count+1}. Eintrag)`}`;
  document.getElementById('ndStart').value = nd.start || '';
  document.getElementById('ndEnd').value = nd.end || '';
  document.getElementById('ndCalc').value = nd.hours || '';
  document.getElementById('ndNote').value = nd.note || '';
  document.getElementById('ndDeleteBtn').style.display = index >= 0 ? 'block' : 'none';
  document.getElementById('notdienstModal').classList.add('open');
}

function closeNotdienst() {
  document.getElementById('notdienstModal').classList.remove('open');
  currentNdDate = null;
  currentNdIndex = -1;
}

function updateNdCalc() {
  const s = document.getElementById('ndStart').value;
  const e = document.getElementById('ndEnd').value;
  document.getElementById('ndCalc').value = calcWorkHours(s,'00:00',e) || '--:--';
}

function saveNotdienst() {
  if (!currentNdDate) return;
  const start = document.getElementById('ndStart').value;
  const end = document.getElementById('ndEnd').value;
  const note = document.getElementById('ndNote').value.trim();
  if (!start || !end) { alert('Bitte Start und Ende eingeben!'); return; }
  const hours = calcWorkHours(start, '00:00', end) || '00:00';
  let arr = userNotdienst[currentNdDate] || [];
  if (!Array.isArray(arr)) arr = [arr];
  if (currentNdIndex >= 0) {
    arr[currentNdIndex] = {start, end, hours, note};
  } else {
    arr.push({start, end, hours, note});
  }
  userNotdienst[currentNdDate] = arr;
  const savedDate = currentNdDate;
  saveData();
  closeNotdienst();
  render();
  // Ask to send report
  setTimeout(() => {
    if (confirm('📧 Notdienst-Bericht per Mail senden?')) {
      openBericht(savedDate);
    }
  }, 300);
}

function deleteNotdienst() {
  if (!currentNdDate) return;
  let arr = userNotdienst[currentNdDate] || [];
  if (!Array.isArray(arr)) arr = [arr];
  if (currentNdIndex >= 0) {
    arr.splice(currentNdIndex, 1);
    if (arr.length === 0) delete userNotdienst[currentNdDate];
    else userNotdienst[currentNdDate] = arr;
  } else {
    delete userNotdienst[currentNdDate];
  }
  saveData();
  closeNotdienst();
  render();
}

// ─── BERICHT (REPORT) ──────────────────────────────────────────
let berichtDate = null;

function openBericht(dateStr) {
  berichtDate = dateStr || null;
  if (!berichtDate) return;
  const parts = berichtDate.split('-');
  const d = new Date(berichtDate);
  const TAGE = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  document.getElementById('berichtDateLabel').textContent = `${TAGE[d.getDay()]}, ${parts[2]}.${parts[1]}.${parts[0]}`;
  // Clear form
  document.getElementById('brKunde').value = '';
  document.getElementById('brAdresse').value = '';
  document.getElementById('brProblem').value = '';
  document.getElementById('brErgebnis').value = '';
  document.getElementById('berichtModal').classList.add('open');
}

function closeBericht() {
  document.getElementById('berichtModal').classList.remove('open');
  berichtDate = null;
}

function sendBericht() {
  const kunde = document.getElementById('brKunde').value.trim();
  const adresse = document.getElementById('brAdresse').value.trim();
  const problem = document.getElementById('brProblem').value.trim();
  const ergebnis = document.getElementById('brErgebnis').value.trim();
  if (!kunde || !problem) {
    alert('Bitte mindestens Kunde und Problem ausfüllen!');
    return;
  }
  const heute = new Date();
  const datumStr = `${String(heute.getDate()).padStart(2,'0')}.${String(heute.getMonth()+1).padStart(2,'0')}.${heute.getFullYear()}`;
  // Build subject
  const kurzProblem = problem.length > 60 ? problem.substring(0, 60) + '...' : problem;
  const betreff = `${datumStr} – ${kunde}, ${adresse} / ${kurzProblem}`;
  // Build body
  let body = `Sehr geehrte Damen und Herren,\n\n`;
  body += `Kunde:\n${kunde}\n\n`;
  body += `Adresse:\n${adresse}\n\n`;
  body += `Problem:\n${problem}\n\n`;
  body += `Ergebnis / Feststellungen:\n\n`;
  const zeilen = ergebnis.split('\n').filter(z => z.trim());
  zeilen.forEach(z => {
    body += `* ${z.trim()}\n`;
  });
  body += `\nMit freundlichen Grüßen\nYusuf Bektas`;
  // Notdienst times
  const ndArr = userNotdienst[berichtDate] || [];
  const arr = Array.isArray(ndArr) ? ndArr : [ndArr];
  if (arr.length > 0) {
    body += `\nNotdienst-Zeiten:\n`;
    arr.forEach((nd, i) => {
      body += `• ${nd.start || '--:--'} – ${nd.end || '--:--'} (${nd.hours || '--:--'} Std)`;
      if (nd.note) body += ` — ${nd.note}`;
      body += '\n';
    });
  }
  // Mail link — opens Outlook app on phone
  const to = 'info@ideal-hannover.de';
  const mailtoUrl = `mailto:${to}?subject=${encodeURIComponent(betreff)}&body=${encodeURIComponent(body)}`;
  window.open(mailtoUrl, '_self');
  closeBericht();
}

// ─── PHOTO SCAN ─────────────────────────────────────────────────
let scannedEntries = [];

function openPhotoScan() {
  document.getElementById('photoModal').classList.add('open');
  document.getElementById('photoPreviewArea').style.display = 'none';
  document.getElementById('scanResult').style.display = 'none';
  document.getElementById('scanLoading').style.display = 'none';
  document.getElementById('photoCamera').value = '';
  document.getElementById('photoGallery').value = '';
  scannedEntries = [];
}

function closePhotoModal() {
  document.getElementById('photoModal').classList.remove('open');
}

function closeDatenModal() {
  document.getElementById('datenModal').classList.remove('open');
}

async function onPhotoSelected(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    document.getElementById('photoPreview').src = e.target.result;
    document.getElementById('photoPreviewArea').style.display = 'block';
    document.getElementById('scanResult').style.display = 'none';
    document.getElementById('scanLoading').style.display = 'block';
    const base64 = e.target.result.split(',')[1];
    const mediaType = file.type || 'image/jpeg';
    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514', max_tokens: 1500,
          messages: [{role:'user', content:[
            {type:'image', source:{type:'base64', media_type:mediaType, data:base64}},
            {type:'text', text:`Dies ist eine Arbeitszeiterfassung. Gib nur ein JSON-Array zurück, nichts anderes:
[{"date":"YYYY-MM-DD","status":"Arbeiten","start":"HH:MM","pause":"HH:MM","end":"HH:MM","hours":"HH:MM"}]
Status: Arbeiten/Urlaub/Krank/Feiertag/Notdienst/Frei.
Notdienst: Falls "Nd" oder "Nd insgesamt" steht, Status=Notdienst. Stunden aus der Abwesenheitsspalte als hours verwenden.
Wochenend-Notdienst einbeziehen. Leere Zeilen überspringen. Jahr aus der Tabelle entnehmen.`}
          ]}]
        })
      });
      const data = await response.json();
      const text = data.content?.map(i=>i.text||'').join('') || '';
      document.getElementById('scanLoading').style.display = 'none';
      try {
        scannedEntries = JSON.parse(text.replace(/```json|```/g,'').trim());
        document.getElementById('scanResultText').textContent = scannedEntries.map(e=>`${e.date}  ${e.status}${e.start?`  ${e.start}→${e.end}`:''}`).join('\n');
        document.getElementById('applyBtn').style.display = scannedEntries.length>0?'block':'none';
      } catch {
        document.getElementById('scanResultText').textContent = text || 'Okunamadı.';
        document.getElementById('applyBtn').style.display = 'none';
      }
      document.getElementById('scanResult').style.display = 'block';
    } catch(err) {
      document.getElementById('scanLoading').style.display = 'none';
      document.getElementById('scanResultText').textContent = 'Hata: '+err.message;
      document.getElementById('applyBtn').style.display = 'none';
      document.getElementById('scanResult').style.display = 'block';
    }
  };
  reader.readAsDataURL(file);
}

function applyScanResult() {
  let count = 0;
  scannedEntries.forEach(e => {
    if (!e.date) return;
    userData[e.date] = e.status;
    if (e.status !== 'Frei' && e.start) userTimes[e.date] = {start:e.start, pause:e.pause||'01:00', end:e.end, hours:e.hours};
    count++;
  });
  saveData(); closePhotoModal(); render();
  setTimeout(()=>alert(`✅ ${count} Tage übertragen!`), 200);
}


function exportAndSave() {
  saveData();
  alert('💾 Daten gespeichert ✓');
}

// ─── EXPORT / IMPORT ────────────────────────────────────────────
function exportData() {
  const data = {
    userData: userData,
    userTimes: userTimes,
    userNotes: userNotes,
    userNotdienst: userNotdienst,
    exportDate: new Date().toISOString()
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `arbeitszeit_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.userData) userData = data.userData;
      if (data.userTimes) userTimes = data.userTimes;
      if (data.userNotes) userNotes = data.userNotes;
      if (data.userNotdienst) userNotdienst = data.userNotdienst;
      saveData();
      render();
      alert('✅ Daten erfolgreich geladen!');
    } catch {
      alert('❌ Datei konnte nicht gelesen werden!');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('datenModal').addEventListener('click', function(e){if(e.target===this)closeDatenModal();});
  document.getElementById('berichtModal').addEventListener('click', function(e){if(e.target===this)closeBericht();});
  document.getElementById('photoModal').addEventListener('click', function(e){if(e.target===this)closePhotoModal();});
  document.getElementById('entryModal').addEventListener('click', function(e){if(e.target===this)closeModal();});
  document.getElementById('ndStart').addEventListener('change', updateNdCalc);
  document.getElementById('ndEnd').addEventListener('change', updateNdCalc);
  document.getElementById('notdienstModal').addEventListener('click', function(e){if(e.target===this)closeNotdienst();});
  document.getElementById('entryStart').addEventListener('change', updateCalc);
  document.getElementById('entryPause').addEventListener('change', updateCalc);
  document.getElementById('entryEnd').addEventListener('change', updateCalc);
  render();
  // Show username
  if (CURRENT_USER !== 'default') {
    document.getElementById('logoText').textContent = '⏱ ' + CURRENT_USER.charAt(0).toUpperCase() + CURRENT_USER.slice(1);
  }
  // Cloud sync — cloud always wins
  (async () => {
    try {
      const cloud = await sbLoad();
      if (cloud && (cloud.userData || cloud.userTimes)) {
        console.log('Cloud data found, applying...');
        userData = cloud.userData || {};
        userTimes = cloud.userTimes || {};
        userNotes = cloud.userNotes || {};
        userNotdienst = cloud.userNotdienst || {};
        localStorage.setItem(LS_PREFIX + 'data', JSON.stringify(userData));
        localStorage.setItem(LS_PREFIX + 'times', JSON.stringify(userTimes));
        localStorage.setItem(LS_PREFIX + 'notes', JSON.stringify(userNotes));
        localStorage.setItem(LS_PREFIX + 'notdienst', JSON.stringify(userNotdienst));
        render();
        showSync('synced', '☁️ Synchronisiert ✓');
      } else {
        // No cloud data yet, push local
        const hasLocal = Object.keys(userData).length > 0 || Object.keys(userTimes).length > 0;
        if (hasLocal) sbSave({ userData, userTimes, userNotes, userNotdienst });
        showSync('synced', '☁️ Verbunden ✓');
      }
    } catch(e) { console.error('Sync error:', e); showSync('error', '⚠️ Offline'); }
  })();
});
